<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BDSM Dynamik</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;--accent2:#533483;--gold:#f5c518;--text:#eee;--muted:#889;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--blue:#3498db}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:16px;padding-bottom:100px}
.screen.active{display:block}
.btn{padding:12px 24px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{filter:brightness(1.2)}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{background:transparent;border:2px solid var(--accent);color:var(--accent)}.btn-outline:hover{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-small{padding:8px 14px;font-size:13px;border-radius:8px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;border:1px solid rgba(255,255,255,.05)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-actions{display:flex;gap:6px;align-items:center}
input,select,textarea{background:var(--surface);color:var(--text);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;font-size:15px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.badge-green{background:rgba(39,174,96,.2);color:var(--green)}
.badge-red{background:rgba(231,76,60,.2);color:var(--red)}
.badge-orange{background:rgba(243,156,18,.2);color:var(--orange)}
.badge-blue{background:rgba(52,152,219,.2);color:var(--blue)}
.badge-gold{background:rgba(245,197,24,.2);color:var(--gold)}
.badge-muted{background:rgba(136,136,153,.2);color:var(--muted)}
.proof-thumb{max-height:120px;border-radius:8px;cursor:pointer;border:2px solid var(--border);transition:transform .2s}
.proof-thumb:hover{transform:scale(1.05)}
.proof-text-block{background:var(--surface);border-left:3px solid var(--blue);padding:8px 12px;border-radius:0 8px 8px 0;margin:8px 0;font-size:13px;color:var(--muted);font-style:italic}
.proof-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.proof-overlay img{max-width:100%;max-height:60vh;border-radius:12px;margin-bottom:16px}
.proof-overlay .proof-text-block{max-width:500px;width:100%;background:var(--card);margin-bottom:16px}
.proof-overlay .proof-actions{display:flex;gap:12px;margin-top:8px}
.proof-badge-icon{font-size:14px;margin-left:4px;opacity:.7}
.proof-upload-area{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin:8px 0}
.proof-upload-area:hover{border-color:var(--accent)}
.proof-upload-area img{max-height:150px;border-radius:8px;margin-top:8px}
.proof-required-hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--blue);margin-top:4px}
.points-display{font-size:32px;font-weight:800;color:var(--gold);text-align:center;margin:12px 0}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px}
.status-online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-offline{background:var(--red)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}
.topbar h2{font-size:18px;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;padding:4px;background:var(--surface);border-radius:14px;margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--muted);border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:420px;max-height:85vh;overflow-y:auto;border:1px solid rgba(255,255,255,.1)}
.modal h3{margin-bottom:16px;font-size:18px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.timer-display{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}
.timer-active{background:rgba(243,156,18,.15);color:var(--orange)}
.timer-expired{background:rgba(231,76,60,.15);color:var(--red)}
.log-entry{padding:10px 12px;border-left:3px solid var(--accent);margin-bottom:8px;background:rgba(15,52,96,.3);border-radius:0 10px 10px 0;font-size:13px}
.log-entry .log-time{color:var(--muted);font-size:11px;margin-bottom:2px}
.log-entry .log-text{color:var(--text)}
.log-entry.log-task{border-left-color:var(--blue)}
.log-entry.log-reward{border-left-color:var(--gold)}
.log-entry.log-punish{border-left-color:var(--red)}
.log-entry.log-rule{border-left-color:var(--accent2)}
.log-entry.log-suggest{border-left-color:var(--green)}
.suggest-card{border:1px solid rgba(39,174,96,.3);background:rgba(39,174,96,.05)}
.archive-card{opacity:.65;border-style:dashed}
.repeat-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(52,152,219,.2);color:var(--blue)}
.section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.empty-state{text-align:center;padding:32px;color:var(--muted);font-size:14px}
.nav-bottom{position:fixed;bottom:0;left:0;width:100%;background:var(--surface);border-top:1px solid rgba(255,255,255,.08);display:flex;z-index:50;padding:8px 0 max(8px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;transition:color .2s;border:none;background:transparent}
.nav-item.active{color:var(--accent)}
.nav-item .nav-icon{font-size:20px}
.counter-badge{background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;position:absolute;top:2px;right:50%;transform:translateX(70%)}
.sub-section-divider{border-top:1px solid rgba(255,255,255,.08);margin:24px 0 8px;padding-top:8px}
.toggle-pill{position:relative;width:44px;height:24px;border-radius:12px;background:#555;cursor:pointer;transition:background .3s;border:none;padding:0;flex-shrink:0}
.toggle-pill.on{background:var(--green)}
.toggle-pill::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s}
.toggle-pill.on::after{transform:translateX(20px)}
.item-inactive{opacity:.5}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;padding:4px;background:var(--surface);border-radius:10px}
.filter-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s}
.filter-btn.active{background:var(--accent);color:#fff}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:8px 0 8px 16px}
.checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .3s ease}

.chat-container{display:flex;flex-direction:column;height:calc(100vh - 260px)}
.chat-messages{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;word-wrap:break-word}
.chat-bubble-self{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-bubble-other{align-self:flex-start;background:var(--card);color:var(--text);border-bottom-left-radius:4px}
.chat-bubble .chat-time{font-size:10px;opacity:.6;margin-top:4px}
.chat-input-area{display:flex;gap:8px;padding:12px 0;border-top:1px solid rgba(255,255,255,.08)}
.stats-bar-container{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px;background:var(--surface);border-radius:12px;margin:12px 0}
.stats-bar{flex:1;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s;position:relative}
.stats-bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.stats-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.stats-card{background:var(--surface);border-radius:12px;padding:12px;text-align:center}
.stats-card .stats-value{font-size:24px;font-weight:800}
.stats-card .stats-label{font-size:11px;color:var(--muted);margin-top:2px}
.category-filter{display:flex;gap:4px;overflow-x:auto;padding:4px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.category-filter::-webkit-scrollbar{display:none}
.cat-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:all .2s}
.cat-btn.active{color:#fff}
.cat-btn:not(.active){background:var(--surface);color:var(--muted)}
.category-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{padding-left:36px;background:var(--surface);border:1px solid rgba(255,255,255,.1)}
.search-bar::before{content:'\1F50D';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5}
.streak-display{display:flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(135deg,rgba(243,156,18,.15),rgba(231,76,60,.1));border-radius:12px;margin-bottom:12px}
.streak-fire{font-size:24px}
.streak-info{flex:1}
.streak-count{font-size:20px;font-weight:800;color:var(--orange)}
.streak-best{font-size:11px;color:var(--muted)}
.rank-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:8px}
.rank-badge.rank-neuling{background:rgba(136,136,153,.2);color:var(--muted)}
.rank-badge.rank-lehrling{background:rgba(52,152,219,.2);color:var(--blue)}
.rank-badge.rank-fortgeschritten{background:rgba(39,174,96,.2);color:var(--green)}
.rank-badge.rank-erfahren{background:rgba(243,156,18,.2);color:var(--orange)}
.rank-badge.rank-meister{background:rgba(233,69,96,.2);color:var(--accent)}
.rank-badge.rank-legende{background:linear-gradient(135deg,rgba(245,197,24,.3),rgba(233,69,96,.2));color:var(--gold)}
.goal-progress{background:var(--surface);border-radius:10px;padding:12px;margin-bottom:12px}
.goal-bar-bg{width:100%;height:20px;background:rgba(255,255,255,.08);border-radius:10px;overflow:hidden;margin:8px 0}
.goal-bar-fill{height:100%;border-radius:10px;transition:width .5s ease;background:linear-gradient(90deg,var(--accent),var(--gold))}
.star-rating{display:inline-flex;gap:2px;cursor:pointer}
.star-rating .star{font-size:22px;color:rgba(255,255,255,.15);transition:color .2s}
.star-rating .star.filled{color:var(--gold)}
.star-rating .star:hover,.star-rating .star.hover{color:var(--gold);opacity:.7}
.history-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-left:3px solid var(--muted);margin-bottom:6px;background:rgba(15,52,96,.3);border-radius:0 10px 10px 0}
.history-entry.history-reward{border-left-color:var(--gold)}
.history-entry.history-punish{border-left-color:var(--red)}
.history-entry.history-task{border-left-color:var(--green)}
.perk-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.perk-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
.perk-item.unlocked{color:var(--green)}
.perk-item.locked{color:var(--muted);opacity:.5}
/* === FEATURE: DOM MESSAGES === */
.msg-banner{background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:14px;padding:16px;margin-bottom:12px;position:relative;animation:slideDown .4s ease}
.msg-banner .msg-close{position:absolute;top:8px;right:12px;background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer}
.msg-banner .msg-from{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:4px}
.msg-banner .msg-text{font-size:15px;line-height:1.5}
.msg-banner .msg-time{font-size:10px;opacity:.5;margin-top:6px}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.dom-msg-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid var(--accent2)}
/* === FEATURE: MOOD CHECK-IN === */
.mood-slider-wrap{display:flex;justify-content:center;gap:12px;padding:8px 0}
.mood-emoji{font-size:32px;cursor:pointer;transition:transform .2s;display:inline-block}
.mood-emoji:hover{transform:scale(1.3)}
.mood-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:8px;background:var(--surface);border-radius:12px}
.mood-bar{flex:1;min-width:16px;border-radius:6px 6px 0 0;position:relative;transition:height .3s;display:flex;align-items:flex-start;justify-content:center}
.mood-bar-label{font-size:12px;margin-top:2px}
/* === FEATURE: DAILY CHALLENGES === */
.challenge-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08)}
.challenge-card.completed{border-color:var(--green);opacity:.7}
.challenge-bonus{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap}
/* === FEATURE: LUCKY WHEEL === */
.wheel-container{text-align:center;padding:16px 0}
.wheel-cost{font-size:14px;color:var(--muted);margin-bottom:12px}
.wheel-canvas{position:relative;display:inline-block}
.wheel-pointer{font-size:28px;color:var(--gold);margin-bottom:-8px;position:relative;z-index:2}
.wheel-result{margin-top:16px;padding:14px;border-radius:12px;font-size:18px;font-weight:700;animation:slideDown .4s ease}
.wheel-result.win{background:rgba(39,174,96,.15);color:var(--green)}
.wheel-result.lose{background:rgba(231,76,60,.15);color:var(--red)}
.wheel-result.warn{color:#f39c12;font-weight:700;font-size:16px;margin-top:12px;text-align:center}
/* === FEATURE: DEADLINE URGENCY === */
.deadline-urgent{border-color:var(--red)!important;box-shadow:0 0 8px rgba(231,76,60,.3);animation:pulseRed 2s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 8px rgba(231,76,60,.3)}50%{box-shadow:0 0 16px rgba(231,76,60,.5)}}
/* === FEATURE: REPEAT FILTER === */
.repeat-filter-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;margin-left:4px}
.repeat-filter-btn.active{background:var(--blue);color:#fff}
/* === FEATURE: ACTIVITY HEATMAP === */
.heatmap-wrap{overflow-x:auto;margin:12px 0;-webkit-overflow-scrolling:touch}
.heatmap-wrap::-webkit-scrollbar{display:none}
.heatmap-grid{display:flex;gap:2px}
.heatmap-col{display:flex;flex-direction:column;gap:2px}
.heatmap-cell{width:12px;height:12px;border-radius:2px;background:rgba(255,255,255,.05)}
.heatmap-cell.l1{background:rgba(39,174,96,.2)}
.heatmap-cell.l2{background:rgba(39,174,96,.4)}
.heatmap-cell.l3{background:rgba(39,174,96,.6)}
.heatmap-cell.l4{background:rgba(39,174,96,.85)}
.heatmap-legend{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;color:var(--muted);justify-content:flex-end}
.heatmap-legend .heatmap-cell{cursor:default}
.heatmap-months{display:flex;font-size:9px;color:var(--muted);margin-bottom:2px}
.heatmap-months span{flex:1;min-width:0}
/* === FEATURE: WEEKLY COMPARISON === */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.compare-card{background:var(--surface);border-radius:12px;padding:12px;text-align:center}
.compare-card .compare-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.compare-card .compare-values{display:flex;justify-content:center;align-items:baseline;gap:8px}
.compare-card .compare-current{font-size:20px;font-weight:800}
.compare-card .compare-prev{font-size:13px;color:var(--muted)}
.compare-card .compare-change{font-size:12px;font-weight:700;margin-top:4px}
.compare-change.up{color:var(--green)}
.compare-change.down{color:var(--red)}
.compare-change.same{color:var(--muted)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="screen active">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px">
<div style="font-size:48px;margin-bottom:8px">&#9878;</div>
<h1 style="font-size:28px;margin-bottom:4px">DYNAMIK</h1>
<p style="color:var(--muted);margin-bottom:40px">Waehle deine Rolle</p>
<div style="display:flex;flex-direction:column;gap:16px;width:100%;max-width:280px">
<button class="btn btn-accent" style="width:100%;padding:18px;font-size:17px;justify-content:center" onclick="chooseDom()">&#9813; Dominant</button>
<button class="btn btn-outline" style="width:100%;padding:18px;font-size:17px;justify-content:center" onclick="chooseSub()">&#9823; Submissive</button>
</div>
</div>
</div>

<!-- PAIRING SCREEN -->
<div id="pairScreen" class="screen">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px">
<div id="pairContent"></div>
</div>
</div>

<!-- DOM DASHBOARD -->
<div id="domScreen" class="screen">
<div class="topbar">
<h2>&#9813; Dom Dashboard</h2>
<div style="display:flex;align-items:center;gap:10px">
<span id="domPartnerStatus"></span>
<button class="btn-icon btn-outline" onclick="openNotifications()" title="Benachrichtigungen" style="position:relative">&#128276;<span id="notifCount" class="counter-badge" style="display:none;position:absolute;top:-4px;right:-4px">0</span></button>
<button class="btn-icon btn-outline" onclick="openSettings()" title="Einstellungen">&#9881;</button>
</div>
</div>
<div id="domRankBadge" style="text-align:center"></div>
<div class="points-display">&#9733; <span id="domPoints">0</span> Punkte</div>
<div id="domStreakDisplay"></div>
<div class="tabs" id="domTabs">
<button class="tab active" onclick="switchDomTab('tasks')">Aufgaben</button>
<button class="tab" onclick="switchDomTab('rewards')">Belohnungen</button>
<button class="tab" onclick="switchDomTab('punishments')">Strafen</button>
<button class="tab" onclick="switchDomTab('rules')">Regeln</button>
<button class="tab" onclick="switchDomTab('suggestions')" style="position:relative">Vorschlaege<span id="suggestCount" class="counter-badge" style="display:none">0</span></button>
<button class="tab" onclick="switchDomTab('templates')">Vorlagen</button>
<button class="tab" onclick="switchDomTab('goals')">Ziele</button>
<button class="tab" onclick="switchDomTab('log')">Log</button>
<button class="tab" onclick="switchDomTab('stats')">Stats</button>
<button class="tab" onclick="switchDomTab('chat')" style="position:relative">Chat<span id="domChatCount" class="counter-badge" style="display:none">0</span></button>
<button class="tab" onclick="switchDomTab('messages')">Nachrichten</button>
<button class="tab" onclick="switchDomTab('wheel')">Gluecksrad</button>
</div>
<div id="domTabContent"></div>
<nav class="nav-bottom">

// STATE
let role=null,sessionCode=null,S={points:0,tasks:{},rewards:{},punishments:{},rules:{},suggestions:{},log:[],notifications:[],archive:{tasks:{},rewards:{},punishments:{},rules:{}},templates:{},settings:{subLog:{enabled:false,categories:{task:true,reward:true,punish:true,rule:true,suggest:true}}}};

function ensureState(){

if(!S.rewards)S.rewards={};

    {id:uid(),label:'x2 Punkte',color:'#e94560',type:'multiply',value:2},

  ];

if(!S.categoryColors)S.categoryColors={};
// Feature: Auto-Spawning Recurring Tasks

// Feature: Push-Benachrichtigungen
if(typeof S.pushEnabled==='undefined')S.pushEnabled=false;
if(!S._pushWarned)S._pushWarned={};
if(!S.settings.domPush) S.settings.domPush = {

// === LOGGING ===
function addLog(type,text){
S.log.unshift({id:uid(),type:type,text:text,time:ts(),timestamp:Date.now()});
if(S.log.length>200)S.log=S.log.slice(0,200);
saveState();
}

function addNotification(text){
if(!S.notifications)S.notifications=[];
S.notifications.unshift({id:uid(),text:text,time:ts(),timestamp:Date.now(),read:false});
if(S.notifications.length>50)S.notifications=S.notifications.slice(0,50);
saveState();
}


// === POINTS HISTORY ===
function addPointsHistory(amount,reason){
if(!S.pointsHistory)S.pointsHistory=[];
S.pointsHistory.push({amount:amount,reason:reason,timestamp:Date.now(),balance:S.points});
if(S.pointsHistory.length>500)S.pointsHistory=S.pointsHistory.slice(-500);
if(amount>0)updateChallengeProgress('points_earned',amount);
}

// === FEATURE: STREAK SYSTEM ===
function todayStr(){return new Date().toISOString().slice(0,10)}
function updateStreak(){
var today=todayStr();
if(S.streak.lastDate===today)return; // already counted today
var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
var yStr=yesterday.toISOString().slice(0,10);
if(S.streak.lastDate===yStr){S.streak.current++;}else{S.streak.current=1;}
S.streak.lastDate=today;
if(S.streak.current>S.streak.best)S.streak.best=S.streak.current;
// Streak bonuses
var bonus=0;
if(S.streak.current>=30)bonus=15;
else if(S.streak.current>=14)bonus=10;
else if(S.streak.current>=7)bonus=5;
else if(S.streak.current>=3)bonus=2;
if(bonus>0){
S.points+=bonus;S.lifetimePoints+=bonus;
addPointsHistory(bonus,'Streak-Bonus ('+S.streak.current+' Tage)');
addNotification('&#128293; Streak-Bonus! +'+bonus+' Punkte fuer '+S.streak.current+' Tage Streak!');
sendPushIfEnabled('streakReminder','Streak-Bonus! +'+bonus+' Punkte fuer '+S.streak.current+' Tage Streak!');
}
}
function renderStreakDisplay(){
var s=S.streak||{current:0,best:0};
if(s.current<1)return '';
var h='<div class="streak-display"><span class="streak-fire">&#128293;</span><div class="streak-info">';
h+='<div class="streak-count">'+s.current+' Tage Streak</div>';
h+='<div class="streak-best">Rekord: '+s.best+' Tage</div>';
h+='</div></div>';
return h;
}

// === FEATURE: RANK SYSTEM ===
var RANKS=[
{name:'Neuling',minPts:0,icon:'&#9898;',css:'neuling',perks:[]},
{name:'Lehrling',minPts:50,icon:'&#128310;',css:'lehrling',perks:['Vorschlaege sichtbar']},
{name:'Fortgeschritten',minPts:200,icon:'&#127811;',css:'fortgeschritten',perks:['Vorschlaege sichtbar','+5% Punkte-Bonus']},
{name:'Erfahren',minPts:500,icon:'&#128310;',css:'erfahren',perks:['Vorschlaege sichtbar','+10% Punkte-Bonus','Chat-Emojis']},
{name:'Meister',minPts:1000,icon:'&#11088;',css:'meister',perks:['Vorschlaege sichtbar','+15% Punkte-Bonus','Chat-Emojis','Eigene Kategorien']},
{name:'Legende',minPts:2500,icon:'&#128081;',css:'legende',perks:['Vorschlaege sichtbar','+20% Punkte-Bonus','Chat-Emojis','Eigene Kategorien','VIP-Status']}
];
function getRank(){
var pts=S.lifetimePoints||0;
var r=RANKS[0];
for(var i=0;i<RANKS.length;i++){if(pts>=RANKS[i].minPts)r=RANKS[i];}
return r;
}
function getNextRank(){
var pts=S.lifetimePoints||0;
for(var i=0;i<RANKS.length;i++){if(pts<RANKS[i].minPts)return RANKS[i];}
return null;
}
function getRankMultiplier(){
var r=getRank();
if(r.name==='Legende')return 1.20;
if(r.name==='Meister')return 1.15;
if(r.name==='Erfahren')return 1.10;
if(r.name==='Fortgeschritten')return 1.05;
return 1.0;
}
function renderRankBadge(){
var r=getRank();
return '<div class="rank-badge rank-'+r.css+'">'+r.icon+' '+r.name+'</div>';
}
function renderRankProgress(){
var r=getRank();var nr=getNextRank();
var pts=S.lifetimePoints||0;
var h='<div class="card">';
h+=renderRankBadge();
h+='<div style="font-size:13px;color:var(--muted)">Gesamt verdient: '+pts+' Punkte</div>';
if(nr){
var prog=pts-r.minPts;
var total=nr.minPts-r.minPts;
var pct=Math.min(100,Math.round(prog/total*100));
h+='<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+pct+'%"></div></div>';
h+='<div style="font-size:12px;color:var(--muted)">Naechster Rang: '+nr.icon+' '+nr.name+' ('+nr.minPts+' Pkt) - noch '+(nr.minPts-pts)+' Pkt</div>';
}else{
h+='<div style="font-size:12px;color:var(--gold);margin-top:4px">&#128081; Hoechster Rang erreicht!</div>';
}
// Show perks
h+='<div class="perk-list" style="margin-top:10px"><div style="font-size:12px;font-weight:700;color:var(--muted)">PERKS:</div>';
var currentPerks=r.perks;
var allPerks=['Vorschlaege sichtbar','+5% Punkte-Bonus','+10% Punkte-Bonus','+15% Punkte-Bonus','+20% Punkte-Bonus','Chat-Emojis','Eigene Kategorien','VIP-Status'];
allPerks.forEach(function(p){
var has=currentPerks.indexOf(p)>=0;
h+='<div class="perk-item '+(has?'unlocked':'locked')+'">'+(has?'&#9989;':'&#128274;')+' '+p+'</div>';
});
h+='</div></div>';
return h;
}

// === FEATURE: GOALS (TAGES-/WOCHEN-ZIELE) ===
function checkGoalReset(){
var now=new Date();
var todayKey=now.toISOString().slice(0,10);
var weekKey=now.getFullYear()+'-W'+String(Math.ceil(((now-new Date(now.getFullYear(),0,1))/86400000+new Date(now.getFullYear(),0,1).getDay()+1)/7)).padStart(2,'0');
if(S.goals.daily.lastReset!==todayKey){S.goals.daily.earned=0;S.goals.daily.lastReset=todayKey;}
if(S.goals.weekly.lastReset!==weekKey){S.goals.weekly.earned=0;S.goals.weekly.lastReset=weekKey;}
}
function addGoalProgress(pts){
checkGoalReset();
if(pts<=0)return;
var dg=S.goals.daily,wg=S.goals.weekly;
var dBefore=dg.earned<dg.target&&dg.target>0;
var wBefore=wg.earned<wg.target&&wg.target>0;
dg.earned+=pts;wg.earned+=pts;
if(dBefore&&dg.earned>=dg.target){
var db=dg.bonus||5;
S.points+=db;S.lifetimePoints+=db;
addPointsHistory(db,'Tagesziel erreicht! Bonus');
addNotification('&#127942; Tagesziel erreicht! +'+db+' Bonus-Punkte!');
}
if(wBefore&&wg.earned>=wg.target){
var wb=wg.bonus||20;
S.points+=wb;S.lifetimePoints+=wb;
addPointsHistory(wb,'Wochenziel erreicht! Bonus');
addNotification('&#127942; Wochenziel erreicht! +'+wb+' Bonus-Punkte!');
}
}
function renderGoals(){
checkGoalReset();
var h='<div class="section-title">&#127942; Tages- & Wochen-Ziele</div>';
// Daily goal
var dg=S.goals.daily;
h+='<div class="goal-progress"><div style="display:flex;justify-content:space-between;align-items:center"><strong>Tagesziel</strong>';
if(role==='dom')h+='<button class="btn btn-small btn-outline" onclick="openGoalModal(&#39;daily&#39;)">Bearbeiten</button>';
h+='</div>';
if(dg.target>0){
var dpct=Math.min(100,Math.round(dg.earned/dg.target*100));
h+='<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+dpct+'%;background:'+(dpct>=100?'var(--green)':'linear-gradient(90deg,var(--accent),var(--gold))')+'"></div></div>';
h+='<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>'+dg.earned+' / '+dg.target+' Pkt</span><span>'+(dpct>=100?'&#9989; Erreicht!':dpct+'%')+'</span></div>';
if(dg.bonus)h+='<div style="font-size:11px;color:var(--gold)">Bonus bei Erreichen: +'+dg.bonus+' Pkt</div>';
}else{h+='<div style="font-size:13px;color:var(--muted);padding:8px 0">Kein Tagesziel gesetzt</div>';}
h+='</div>';
// Weekly goal
var wg=S.goals.weekly;
h+='<div class="goal-progress"><div style="display:flex;justify-content:space-between;align-items:center"><strong>Wochenziel</strong>';
if(role==='dom')h+='<button class="btn btn-small btn-outline" onclick="openGoalModal(&#39;weekly&#39;)">Bearbeiten</button>';
h+='</div>';
if(wg.target>0){
var wpct=Math.min(100,Math.round(wg.earned/wg.target*100));
h+='<div class="goal-bar-bg"><div class="goal-bar-fill" style="width:'+wpct+'%;background:'+(wpct>=100?'var(--green)':'linear-gradient(90deg,var(--accent),var(--gold))')+'"></div></div>';
h+='<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted)"><span>'+wg.earned+' / '+wg.target+' Pkt</span><span>'+(wpct>=100?'&#9989; Erreicht!':wpct+'%')+'</span></div>';
if(wg.bonus)h+='<div style="font-size:11px;color:var(--gold)">Bonus bei Erreichen: +'+wg.bonus+' Pkt</div>';
}else{h+='<div style="font-size:13px;color:var(--muted);padding:8px 0">Kein Wochenziel gesetzt</div>';}
h+='</div>';
return h;
}
function openGoalModal(type){
var g=S.goals[type]||{};
var label=type==='daily'?'Tagesziel':'Wochenziel';
openModal('<h3>'+label+' setzen</h3>'+
'<div class="form-group"><label>Punkteziel</label><input id="mGoalTarget" type="number" min="0" value="'+(g.target||0)+'"></div>'+
'<div class="form-group"><label>Bonus-Punkte bei Erreichen</label><input id="mGoalBonus" type="number" min="0" value="'+(g.bonus||(type==='daily'?5:20))+'"></div>'+
'<button class="btn btn-accent" style="width:100%;justify-content:center" onclick="saveGoal(&#39;'+type+'&#39;)">Speichern</button>');
}
function saveGoal(type){
S.goals[type].target=parseInt($('mGoalTarget').value)||0;
S.goals[type].bonus=parseInt($('mGoalBonus').value)||0;
saveState();closeModal();render();
}

// === FEATURE: AUFGABEN-BEWERTUNG ===
function openRatingModal(taskId){
var t=S.tasks[taskId]||S.archive.tasks[taskId];
if(!t)return;
openModal('<h3>Aufgabe bewerten</h3>'+
'<p style="color:var(--muted);margin-bottom:12px">'+esc(t.name)+'</p>'+
'<div id="ratingStars" class="star-rating" style="font-size:32px;justify-content:center;display:flex;gap:8px;margin:16px 0">'+
'<span class="star" onclick="setRating(&#39;'+taskId+'&#39;,1)" onmouseover="hoverStars(1)" onmouseout="hoverStars(0)">&#9733;</span>'+
'<span class="star" onclick="setRating(&#39;'+taskId+'&#39;,2)" onmouseover="hoverStars(2)" onmouseout="hoverStars(0)">&#9733;</span>'+
'<span class="star" onclick="setRating(&#39;'+taskId+'&#39;,3)" onmouseover="hoverStars(3)" onmouseout="hoverStars(0)">&#9733;</span>'+
'<span class="star" onclick="setRating(&#39;'+taskId+'&#39;,4)" onmouseover="hoverStars(4)" onmouseout="hoverStars(0)">&#9733;</span>'+
'<span class="star" onclick="setRating(&#39;'+taskId+'&#39;,5)" onmouseover="hoverStars(5)" onmouseout="hoverStars(0)">&#9733;</span>'+
'</div>'+
'<p style="text-align:center;color:var(--muted);font-size:13px">Klicke einen Stern fuer Bonus-Punkte</p>');
}
function hoverStars(n){
var stars=document.querySelectorAll('#ratingStars .star');
stars.forEach(function(s,i){s.classList.toggle('hover',i<n);});
}
function setRating(taskId,stars){
var bonus=[0,1,2,3,5,8][stars]||0;
S.ratings.push({taskId:taskId,stars:stars,bonus:bonus,timestamp:Date.now()});
if(bonus>0){
S.points+=bonus;S.lifetimePoints+=bonus;
addPointsHistory(bonus,'Bewertungs-Bonus ('+stars+' Sterne)');
addGoalProgress(bonus);
}
addNotification('Aufgabe bewertet: '+stars+' Sterne'+(bonus>0?' (+'+bonus+' Bonus)':''));
saveState();closeModal();render();
}
function getAvgRating(){
if(!S.ratings||!S.ratings.length)return 0;
var sum=0;S.ratings.forEach(function(r){sum+=(r.stars||r.rating||0);});
return (sum/S.ratings.length).toFixed(1);
}

function saveTemplate(){

if(!name){alert('Name eingeben');return;}
var editId=$('mTplEditId')?$('mTplEditId').value:'';
var checked=document.querySelectorAll('.tplTaskChk:checked');
var taskDefs=[];
var taskIds=[];
checked.forEach(function(cb){
var tid=cb.value;
var t=S.tasks[tid];
if(t){
taskIds.push(tid);
taskDefs.push({name:t.name,desc:t.desc||'',points:t.points||0,timer:t.timer||0,repeat:t.repeat||'none',repeatDays:t.repeatDays||[],repeatInterval:t.repeatInterval||0,penaltyId:t.penaltyId||null});
}
});
if(!taskDefs.length){alert('Mindestens eine Aufgabe auswaehlen');return;}

function applyTemplate(id){
var tp=S.templates[id];
if(!tp||!tp.tasks||!tp.tasks.length)return;
if(!confirm('Alle '+tp.tasks.length+' Aufgaben aus "'+tp.name+'" zuweisen?'))return;
var count=0;
for(var i=0;i<tp.tasks.length;i++){
var def=tp.tasks[i];
var tid='task_'+Date.now()+'_'+i;
var deadline=null,timerEnd=null;
if(def.timer&&def.timer>0){timerEnd=Date.now()+def.timer*60000;}
S.tasks[tid]={name:def.name,desc:def.desc||'',points:def.points||0,timer:def.timer||0,deadline:deadline,timerEnd:timerEnd,timerExpired:false,repeat:def.repeat||'none',repeatDays:def.repeatDays||[],repeatInterval:def.repeatInterval||0,status:'active',penaltyId:def.penaltyId||null,category:def.category||'Sonstiges',created:Date.now()};
count++;
}
addLog('template','Vorlage "'+tp.name+'" angewendet: '+count+' Aufgaben erstellt');
saveState();render();
}

function quickSaveTemplate(taskId){

// === REPEAT HELPERS ===
var dayNames=['Mo','Di','Mi','Do','Fr','Sa','So'];
function getRepeatLabel(t){
if(!t.repeat||t.repeat==='none')return '';
var r=t.repeat;
if(r==='daily')return 'Taeglich';
if(r==='weekly')return 'Woechentlich';
if(r==='monthly')return 'Monatlich';
if(r==='weekend')return 'Wochenende';
if(r==='weekdays'&&t.repeatDays&&t.repeatDays.length){
return t.repeatDays.map(function(d){return dayNames[d]||'';}).join(', ');
}
if(r==='interval'&&t.repeatInterval>0)return 'Alle '+t.repeatInterval+' Tage';
return r;
}
function isTaskActiveToday(t){
var r=t.repeat;
if(!r||r==='none'||r==='daily'||r==='weekly'||r==='monthly')return true;
var jsDay=new Date().getDay();// 0=Sun
var isoDay=(jsDay+6)%7;// 0=Mon
if(r==='weekend')return isoDay>=5;
if(r==='weekdays'&&t.repeatDays&&t.repeatDays.length)return t.repeatDays.indexOf(isoDay)>=0;
if(r==='interval'&&t.repeatInterval>0){
var created=t.created||Date.now();
var daysSince=Math.floor((Date.now()-created)/86400000);
return daysSince%t.repeatInterval===0;
}
return true;
}
function calcNextDeadline(t){
var r=t.repeat,dl=t.deadline;
if(r==='daily'){return dl?dl+86400000:null;}
if(r==='weekly'){return dl?dl+604800000:null;}
if(r==='monthly'){return dl?dl+2592000000:null;}
if(r==='weekend'||r==='weekdays'){
if(!dl)return null;
// find next active day
var next=new Date(dl);
var rd=r==='weekend'?[5,6]:(t.repeatDays||[]);
if(!rd.length)return dl+86400000;
for(var i=1;i<=7;i++){
next.setDate(next.getDate()+1);
var isoD=(next.getDay()+6)%7;
if(rd.indexOf(isoD)>=0){
next.setHours(23,59,0,0);
return next.getTime();
}
}
return dl+86400000;
}
if(r==='interval'&&t.repeatInterval>0){
return dl?dl+t.repeatInterval*86400000:null;
}
return null;
}
function spawnNextRepeat(t){
var rep=t.repeat;
if(!rep||rep==='none')return;
var newDeadline=calcNextDeadline(t);
var newTimerEnd=newDeadline;
if(!newDeadline&&t.timer>0){newTimerEnd=Date.now()+t.timer*60000;}
S.tasks[uid()]={name:t.name,desc:t.desc,points:t.points,timer:t.timer,deadline:newDeadline,timerEnd:newTimerEnd,timerExpired:false,repeat:t.repeat,repeatDays:t.repeatDays||[],repeatInterval:t.repeatInterval||0,status:'active',penaltyId:t.penaltyId||null,category:t.category||'Sonstiges',created:t.created||Date.now()};
}

function startTimers(){
clearInterval(window._timerInterval);
window._timerInterval=setInterval(function(){
var changed=false;
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
if(t.timerEnd&&t.status==='active'&&!t.timerExpired){
// Skip if not active today (weekday/weekend/interval tasks)
if(!isTaskActiveToday(t))return;
if(Date.now()>=t.timerEnd){
t.timerExpired=true;t.status='failed';
addLog('punish','Aufgabe "'+t.name+'" - Timer abgelaufen!');
if(t.penaltyId&&S.punishments[t.penaltyId]){
executePunish(t.penaltyId,t.name);
}
changed=true;
}
}
});
// Auto-set deadline for repeating tasks without timer
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
var isRepeat=t.repeat&&t.repeat!=='none';
if(isRepeat&&t.status==='active'&&!t.timerEnd&&isTaskActiveToday(t)){
var endOfDay=new Date();endOfDay.setHours(23,59,0,0);
t.timerEnd=endOfDay.getTime();t.deadline=endOfDay.getTime();
changed=true;
}
});
if(changed)saveState();
renderTimerDisplays();
},1000);
}
function renderTimerDisplays(){
document.querySelectorAll('[data-timer-id]').forEach(function(el){
var t=S.tasks[el.dataset.timerId];
if(!t||!t.timerEnd||t.status!=='active')return;
var rem=Math.max(0,t.timerEnd-Date.now());
if(rem<=0){el.innerHTML='<span class="timer-display timer-expired">&#9200; Abgelaufen!</span>';return}
var d=Math.floor(rem/86400000),hr=Math.floor((rem%86400000)/3600000),mn=Math.floor((rem%3600000)/60000),sc=Math.floor((rem%60000)/1000);
var txt='';
if(d>0)txt=d+'d '+hr+'h';
else if(hr>0)txt=hr+'h '+mn+'m';
else txt=mn+'m '+String(sc).padStart(2,'0')+'s';
el.innerHTML='<span class="timer-display timer-active">&#9200; '+txt+'</span>';
});
}

var bonusTxt=mult>1?' (Rang-Bonus x'+mult.toFixed(2)+')':'';

updateChallengeProgress('task_completed',1,t.category);
addPointsHistory(pts,'Aufgabe erledigt: '+t.name+bonusTxt);

updateStreak();
addGoalProgress(pts);
addRedeemHistory('task',t.name,-pts);

archiveTask(id);
}
function approveTask(id){

var _proofPhotoData=null;
function compressImage(file,cb){
var reader=new FileReader();
reader.onload=function(e){
var img=new Image();
img.onload=function(){
var maxW=800,w=img.width,h=img.height;
if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
var canvas=document.createElement('canvas');
canvas.width=w;canvas.height=h;
var ctx=canvas.getContext('2d');
ctx.drawImage(img,0,0,w,h);
cb(canvas.toDataURL('image/jpeg',0.6));
};
img.src=e.target.result;
};
reader.readAsDataURL(file);
}

var chatListener=null;

function renderChat(){
var h='<div class="chat-container">';

if(!msgs.length){
h+='<div class="empty-state">Noch keine Nachrichten. Starte die Unterhaltung!</div>';
}else{
msgs.forEach(function(m){
var isSelf=m.from===role;
var cls=isSelf?'chat-bubble-self':'chat-bubble-other';
var d=new Date(m.timestamp);
var timeStr=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
h+='<div class="chat-bubble '+cls+'"><div>'+esc(m.text)+'</div><div class="chat-time">'+timeStr+'</div></div>';
});
}
h+='</div>';
h+='<div class="chat-input-area"><input id="chatInput" placeholder="Nachricht schreiben..." style="flex:1" onkeydown="if(event.key===&#39;Enter&#39;)sendMessage()"><button class="btn btn-accent btn-small" onclick="sendMessage()">&#10148;</button></div>';
h+='</div>';

}

function sendMessage(){
var input=$('chatInput');
if(!input)return;
var text=input.value.trim();
if(!text)return;
input.value='';
var msg={id:uid(),from:role,text:text,timestamp:Date.now(),read:false};
ref('messages').push(msg);
}

function scrollChatBottom(){
setTimeout(function(){
var el=$('chatMessages');
if(el)el.scrollTop=el.scrollHeight;
},100);
}

function updateChatBadges(){
var count=S.unreadChat||0;
var ids=['domChatCount','domChatCountNav','subChatCount','subChatCountNav'];
ids.forEach(function(id){
var el=$(id);
if(el){el.textContent=count;el.style.display=count>0?'inline':'none';}
});
}

function markMessagesRead(){
if(!chatMessages.length)return;
var updates={};
chatMessages.forEach(function(m){
if(m.from!==role&&!m.read&&m._key){
updates[m._key+'/read']=true;
}
});
if(Object.keys(updates).length){
ref('messages').update(updates);
}
}

function startChatListener(){
if(chatListener)return;
chatMessages=[];
var msgRef=ref('messages');
chatListener=msgRef;
msgRef.orderByChild('timestamp').limitToLast(100).on('value',function(snap){
var data=snap.val();
chatMessages=[];
if(data){
Object.keys(data).forEach(function(key){
var m=data[key];
m._key=key;
chatMessages.push(m);
});
chatMessages.sort(function(a,b){return a.timestamp-b.timestamp;});
// Store last 100 in S.messages for offline
S.messages=chatMessages.map(function(m){return {id:m.id,from:m.from,text:m.text,timestamp:m.timestamp,read:m.read};}).slice(-100);
// Count unread
var isOnChat=(role==='dom'&&domTab==='chat')||(role==='sub'&&subTab==='chat');
if(!isOnChat){
var unread=0;
chatMessages.forEach(function(m){if(m.from!==role&&!m.read)unread++;});
if(unread>S.unreadChat){
S.unreadChat=unread;
addNotification('Neue Nachricht'+(unread>1?'en':'')+' im Chat');
}
S.unreadChat=unread;
}else{
S.unreadChat=0;
markMessagesRead();
}
updateChatBadges();
}
if((role==='dom'&&domTab==='chat')||(role==='sub'&&subTab==='chat')){
var c=$(role==='dom'?'domTabContent':'subTabContent');
if(c)c.innerHTML=renderChat();
scrollChatBottom();
}
});
}

function generateDailyChallenges(){
var today=todayStr();
if(S.dailyChallenges&&S.dailyChallenges.date===today&&S.dailyChallenges.challenges.length>0)return;
var cats=S.categories||['Sonstiges'];
var taskList=Object.values(S.tasks||{}).filter(function(t){return t.status==='active';});
var challenges=[];
var n=Math.min(3,Math.max(1,taskList.length));
challenges.push({id:uid(),type:'complete_tasks',desc:'Erledige heute '+n+' Aufgaben',target:n,progress:0,bonus:n*5,completed:false});
var catTasks={};
taskList.forEach(function(t){var c=t.category||'Sonstiges';if(!catTasks[c])catTasks[c]=0;catTasks[c]++;});
var activeCats=Object.keys(catTasks).filter(function(c){return catTasks[c]>=1;});
if(activeCats.length>0){
var randCat=activeCats[Math.floor(Math.random()*activeCats.length)];
challenges.push({id:uid(),type:'category_tasks',desc:'Erledige eine Aufgabe aus "'+randCat+'"',category:randCat,target:1,progress:0,bonus:8,completed:false});
}
var pointTarget=Math.max(10,Math.round((taskList.reduce(function(s,t){return s+(t.points||0);},0)/Math.max(1,taskList.length))*1.5));
challenges.push({id:uid(),type:'earn_points',desc:'Verdiene heute '+pointTarget+' Punkte',target:pointTarget,progress:0,bonus:10,completed:false});
S.dailyChallenges={date:today,challenges:challenges};
saveState();
}
function updateChallengeProgress(type,value,category){
if(!S.dailyChallenges||S.dailyChallenges.date!==todayStr())return;
S.dailyChallenges.challenges.forEach(function(c){
if(c.completed)return;
if(type==='task_completed'&&c.type==='complete_tasks'){
c.progress++;
}
if(type==='task_completed'&&c.type==='category_tasks'&&category===c.category){
c.progress++;
}
if(type==='points_earned'&&c.type==='earn_points'){
c.progress+=value;
}
if(c.progress>=c.target&&!c.completed){
c.completed=true;
S.points+=c.bonus;
addPointsHistory(c.bonus,'Challenge-Bonus: '+c.desc);
addNotification('Challenge geschafft! +'+c.bonus+' Bonus');
addLog('challenge','Challenge abgeschlossen: "'+c.desc+'" (+'+c.bonus+')');
}
});
}

});
}

}
function drawWheel(rotation, canvasEl, radius){
var canvas = canvasEl || $('wheelCanvas');
if(!canvas)return;
var r = radius || 130;
var size = r*2+20;
canvas.width=size;canvas.height=size;
var ctx=canvas.getContext('2d');
var cx=size/2, cy=size/2;
var segs = S.wheelConfig.segments || [];
if(segs.length===0) return;
var arc=2*Math.PI/segs.length;
var startAngle=rotation||0;
ctx.clearRect(0,0,size,size);
segs.forEach(function(seg,i){
var angle=startAngle+i*arc;
ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,angle,angle+arc);
ctx.fillStyle=seg.color;
ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.15)';
ctx.lineWidth=2;
ctx.stroke();
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(angle+arc/2);
ctx.fillStyle='#fff';
var fontSize=Math.max(9,Math.min(11,r/12));
ctx.font='bold '+fontSize+'px sans-serif';
ctx.textAlign='center';
ctx.fillText(seg.label,r*0.65,4);
ctx.restore();
});
ctx.beginPath();ctx.arc(cx,cy,Math.min(20,r/6),0,2*Math.PI);
ctx.fillStyle='#1a1a2e';ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.2)';ctx.stroke();
}
function spinWheel(){
var cost = S.wheelConfig.cost || 15;
if(wheelSpinning || S.points < cost) return;
// Check daily limit
var maxSpins = S.wheelConfig.maxSpinsPerDay || 0;
if(maxSpins > 0){
  var today = new Date().toDateString();
  if(!S.wheelSpinsToday || S.wheelSpinsToday.date !== today){
    S.wheelSpinsToday = {date: today, count: 0};
  }
  if(S.wheelSpinsToday.count >= maxSpins){
    alert('Maximale Anzahl Spins fuer heute erreicht ('+maxSpins+')');
    return;
  }
  S.wheelSpinsToday.count++;
}
wheelSpinning=true;
S.points-=cost;
addPointsHistory(-cost,'Gluecksrad-Einsatz');
saveState();render();
var btn=$('spinBtn');if(btn)btn.disabled=true;
var segs=S.wheelConfig.segments||[];
if(segs.length===0){wheelSpinning=false;return;}
var winIdx=Math.floor(Math.random()*segs.length);
var arc=2*Math.PI/segs.length;
var targetAngle=-(winIdx*arc+arc/2)-Math.PI/2;
var totalRotation=targetAngle-Math.PI*2*(3+Math.random()*2);
var startTime=null;
var duration=3000;
var currentRotation=0;
function animate(time){
if(!startTime)startTime=time;
var elapsed=time-startTime;
var progress=Math.min(1,elapsed/duration);
var ease=1-Math.pow(1-progress,3);
currentRotation=totalRotation*ease;
drawWheel(currentRotation);
if(progress<1){
requestAnimationFrame(animate);
}else{
wheelSpinning=false;
var seg=segs[winIdx];
var resultEl=$('wheelResult');
var resultMsg='';
if(seg.type==='nothing'){
  resultMsg='<div class="wheel-result lose">Niete! Kein Gewinn</div>';
  S.wheelHistory.push({label:'Niete',won:0,timestamp:Date.now()});
} else if(seg.type==='bonus'){
  S.points+=seg.value;
  addPointsHistory(seg.value,'Gluecksrad: '+seg.label);
  resultMsg='<div class="wheel-result win">'+esc(seg.label)+'! &#127881;</div>';
  S.wheelHistory.push({label:seg.label,won:seg.value,timestamp:Date.now()});
  addNotification('Gluecksrad: '+seg.label+'!');
  sendPushIfEnabled('wheelSpin','Gluecksrad: '+seg.label+'!');
} else if(seg.type==='multiply'){
  S.wheelMultiplier=seg.value;
  resultMsg='<div class="wheel-result win">'+esc(seg.label)+'! Naechste Aufgabe zaehlt '+seg.value+'x! &#127881;</div>';
  S.wheelHistory.push({label:seg.label,won:0,timestamp:Date.now()});
  addNotification('Gluecksrad: '+seg.label+'!');
  sendPushIfEnabled('wheelSpin','Gluecksrad Multiplikator: x'+seg.value);
} else if(seg.type==='points_remove'){
  var remove=Math.min(S.points, seg.value);
  S.points-=remove;
  addPointsHistory(-remove,'Gluecksrad: '+seg.label);
  resultMsg='<div class="wheel-result lose">'+esc(seg.label)+'! -'+remove+' Punkte &#128555;</div>';
  S.wheelHistory.push({label:seg.label,won:-remove,timestamp:Date.now()});
  addNotification('Gluecksrad: -'+remove+' Punkte!');
  sendPushIfEnabled('wheelSpin','Gluecksrad: -'+remove+' Punkte');
} else if(seg.type==='task'){
  var taskEntries=Object.entries(S.tasks||{}).filter(function(e){return e[1].status==='active';});
  var chosen=null;
  if(seg.linkedId && S.tasks[seg.linkedId]){
    chosen={id:seg.linkedId, task:S.tasks[seg.linkedId]};
  } else if(taskEntries.length>0){
    var pick=taskEntries[Math.floor(Math.random()*taskEntries.length)];
    chosen={id:pick[0], task:pick[1]};
  }
  if(chosen){
    chosen.task.wheelAssigned=true;
    chosen.task.wheelAssignedTime=Date.now();
    resultMsg='<div class="wheel-result warn">&#128221; Aufgabe: "'+esc(chosen.task.name)+'" - Sofort erledigen! &#128293;</div>';
    S.wheelHistory.push({label:'Aufgabe: '+chosen.task.name,won:0,timestamp:Date.now()});
    addNotification('Gluecksrad: Aufgabe zugewiesen - "'+chosen.task.name+'"');
    sendPushIfEnabled('wheelSpin','Aufgabe zugewiesen: '+chosen.task.name);
  } else {
    resultMsg='<div class="wheel-result lose">Aufgabe - aber keine aktiven Aufgaben vorhanden!</div>';
    S.wheelHistory.push({label:'Aufgabe (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
} else if(seg.type==='punishment'){
  var punEntries=Object.entries(S.punishments||{});
  var chosenPun=null;
  if(seg.linkedId && S.punishments[seg.linkedId]){
    chosenPun={id:seg.linkedId, pun:S.punishments[seg.linkedId]};
  } else if(punEntries.length>0){
    var pick=punEntries[Math.floor(Math.random()*punEntries.length)];
    chosenPun={id:pick[0], pun:pick[1]};
  }
  if(chosenPun){
    var punPts=chosenPun.pun.points||0;
    if(punPts>0){ S.points-=Math.min(S.points,punPts); addPointsHistory(-Math.min(S.points,punPts),'Gluecksrad-Strafe: '+chosenPun.pun.name); }
    resultMsg='<div class="wheel-result lose">&#9888; Strafe: "'+esc(chosenPun.pun.name)+'"'+(punPts>0?' (-'+punPts+' Pkt)':'')+' &#128528;</div>';
    S.wheelHistory.push({label:'Strafe: '+chosenPun.pun.name,won:punPts>0?-punPts:0,timestamp:Date.now()});
    addNotification('Gluecksrad: Strafe - "'+chosenPun.pun.name+'"');
    sendPushIfEnabled('punishmentApplied','Gluecksrad-Strafe: '+chosenPun.pun.name);
  } else {
    resultMsg='<div class="wheel-result lose">Strafe - aber keine Strafen definiert!</div>';
    S.wheelHistory.push({label:'Strafe (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
} else if(seg.type==='reward'){
  var rewEntries=Object.entries(S.rewards||{});
  var chosenRew=null;
  if(seg.linkedId && S.rewards[seg.linkedId]){
    chosenRew={id:seg.linkedId, rew:S.rewards[seg.linkedId]};
  } else if(rewEntries.length>0){
    var pick=rewEntries[Math.floor(Math.random()*rewEntries.length)];
    chosenRew={id:pick[0], rew:pick[1]};
  }
  if(chosenRew){
    resultMsg='<div class="wheel-result win">&#127873; Gratis-Belohnung: "'+esc(chosenRew.rew.name)+'" &#127881;</div>';
    S.wheelHistory.push({label:'Belohnung: '+chosenRew.rew.name,won:0,timestamp:Date.now()});
    addNotification('Gluecksrad: Gratis-Belohnung - "'+chosenRew.rew.name+'"!');
    addRedeemHistory('reward',chosenRew.rew.name,0,0);
    sendPushIfEnabled('wheelSpin','Gratis-Belohnung: '+chosenRew.rew.name);
  } else {
    resultMsg='<div class="wheel-result win">Belohnung - aber keine definiert!</div>';
    S.wheelHistory.push({label:'Belohnung (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
}
if(resultEl) resultEl.innerHTML=resultMsg;
if(S.wheelHistory.length>50)S.wheelHistory=S.wheelHistory.slice(-50);
saveState();
var wheelCostNow=S.wheelConfig.cost||15;
var btn2=$('spinBtn');
if(btn2){btn2.disabled=S.points<wheelCostNow;btn2.style.opacity=S.points<wheelCostNow?'.4':'1';}
}
}
requestAnimationFrame(animate);
}

// === FEATURE: AUTO-SPAWNING RECURRING TASKS ===
function checkRecurringTasks(){
var today=todayStr();
if(S._lastRecurCheck===today)return;
S._lastRecurCheck=today;
var spawned=0;
// Check completed tasks that have repeat settings but next wasn't spawned
Object.entries(S.tasks||{}).forEach(function(e){
var id=e[0],t=e[1];
if(t.repeat&&t.repeat!=='none'&&t.status==='completed'){
spawnNextRepeat(t);
t.repeat='none';
spawned++;
}
});
// Check archive: find repeat tasks missing an active instance
var activeRepeatNames={};
Object.values(S.tasks||{}).forEach(function(t){
if(t.repeat&&t.repeat!=='none'&&(t.status==='active'||t.status==='submitted'||t.status==='done')){
activeRepeatNames[t.name+'_'+t.repeat]=true;
}
});
Object.entries(S.archive&&S.archive.tasks||{}).forEach(function(e){
var t=e[1];
if(t.repeat&&t.repeat!=='none'&&!activeRepeatNames[t.name+'_'+t.repeat]){
var nextDl=calcNextDeadline(t);
if(nextDl&&nextDl<=Date.now()+86400000){
spawnNextRepeat(t);
spawned++;
activeRepeatNames[t.name+'_'+t.repeat]=true;
}
}
});
if(spawned>0){
addNotification(spawned+' wiederkehrende Aufgabe'+(spawned>1?'n':'')+' erstellt');
saveState();
}
}

// === FEATURE: WEEKLY COMPARISON ===
function renderWeeklyComparison(){
var h='<div class="section-title">&#128200; Wochen-Vergleich</div>';
var now=new Date();
var todayMs=now.getTime();
var dayOfWeek=(now.getDay()+6)%7;
var thisWeekStart=new Date(now);
thisWeekStart.setDate(thisWeekStart.getDate()-dayOfWeek);
thisWeekStart.setHours(0,0,0,0);
var thisWeekMs=thisWeekStart.getTime();
var lastWeekStart=thisWeekMs-7*86400000;
var lastWeekEnd=thisWeekMs;
var thisWeek={tasks:0,points:0,earned:0,spent:0,activities:0};
var lastWeek={tasks:0,points:0,earned:0,spent:0,activities:0};
(S.pointsHistory||[]).forEach(function(e){
var t=e.timestamp;
if(t>=thisWeekMs&&t<=todayMs){
thisWeek.activities++;
if(e.amount>0){thisWeek.earned+=e.amount;thisWeek.points+=e.amount;}
else{thisWeek.spent+=Math.abs(e.amount);}
}else if(t>=lastWeekStart&&t<lastWeekEnd){
lastWeek.activities++;
if(e.amount>0){lastWeek.earned+=e.amount;lastWeek.points+=e.amount;}
else{lastWeek.spent+=Math.abs(e.amount);}
}
});
(S.log||[]).forEach(function(e){
var t=e.timestamp;
if(!t)return;
var isTask=e.type==='task'&&e.text&&(e.text.indexOf('erledigt')>=0||e.text.indexOf('genehmigt')>=0);
if(t>=thisWeekMs&&t<=todayMs){
if(isTask)thisWeek.tasks++;
}else if(t>=lastWeekStart&&t<lastWeekEnd){
if(isTask)lastWeek.tasks++;
}
});
function pctChange(curr,prev){
if(prev===0&&curr===0)return {pct:0,dir:'same'};
if(prev===0)return {pct:100,dir:'up'};
var p=Math.round((curr-prev)/prev*100);
return {pct:Math.abs(p),dir:p>0?'up':(p<0?'down':'same')};
}
function changeTag(c){
var arrow=c.dir==='up'?'&#9650; +':'&#9660; -';
if(c.dir==='same')return '<div class="compare-change same">&#8596; Gleich</div>';
return '<div class="compare-change '+c.dir+'">'+arrow+c.pct+'%</div>';
}
var metrics=[
{label:'Aufgaben erledigt',curr:thisWeek.tasks,prev:lastWeek.tasks},
{label:'Punkte verdient',curr:thisWeek.earned,prev:lastWeek.earned},
{label:'Punkte ausgegeben',curr:thisWeek.spent,prev:lastWeek.spent},
{label:'Aktivitaeten',curr:thisWeek.activities,prev:lastWeek.activities}
];
h+='<div class="compare-grid">';
metrics.forEach(function(m){
var change=pctChange(m.curr,m.prev);
h+='<div class="compare-card"><div class="compare-label">'+m.label+'</div>';
h+='<div class="compare-values"><span class="compare-current">'+m.curr+'</span><span class="compare-prev">vs '+m.prev+'</span></div>';
h+=changeTag(change)+'</div>';
});
h+='</div>';
return h;
}

// === FEATURE: PUSH NOTIFICATIONS ===
var pushSupported='Notification' in window;

function initPushNotifications(){
  if(!pushSupported) return;
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(config && config.enabled && Notification.permission==='granted'){
    scheduleReminders();
  }
}

function sendPushIfEnabled(eventType, body){
  if(!pushSupported || Notification.permission!=='granted') return;
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(!config || !config.enabled) return;
  if(config.events && config.events[eventType]===false) return;
  showNativeNotification('BDSM Dynamik', body);
}

function togglePushMaster(){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(!config.enabled){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted'){
        config.enabled=true;
        saveState();
        showNativeNotification('BDSM Dynamik','Benachrichtigungen aktiviert!');
        scheduleReminders();
        openSettings();
      } else {
        alert('Benachrichtigungen wurden vom Browser blockiert.');
      }
    });
  } else {
    config.enabled=false;
    if(window._reminderInterval) clearInterval(window._reminderInterval);
    saveState();
    openSettings();
  }
}

function togglePushEvent(eventKey){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  config.events[eventKey] = !config.events[eventKey];
  saveState();
  openSettings();
}

function updateDeadlineMinutes(val){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  config.deadlineMinutes = parseInt(val) || 30;
  saveState();
}

function showNativeNotification(title,body){
if(!pushSupported||Notification.permission!=='granted')return;
try{
new Notification(title,{body:body,icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9878;</text></svg>',badge:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9878;</text></svg>'});
}catch(e){
if('serviceWorker' in navigator&&navigator.serviceWorker.ready){
navigator.serviceWorker.ready.then(function(reg){
reg.showNotification(title,{body:body});
});
}
}
}

function scheduleReminders(){
  if(window._reminderInterval) clearInterval(window._reminderInterval);
  window._reminderInterval=setInterval(function(){
    var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
    if(!config || !config.enabled || Notification.permission!=='granted') return;
    var deadlineMin = config.deadlineMinutes || 30;
    var warned=S._pushWarned||{};

    // Deadline warnings
    if(config.events.deadlineWarning!==false){
      Object.entries(S.tasks||{}).forEach(function(e){
        var id=e[0],t=e[1];
        if(t.status!=='active') return;
        var dl=t.deadline||t.timerEnd;
        if(!dl) return;
        var rem=dl-Date.now();
        if(rem>0 && rem<deadlineMin*60000 && !warned['dl_'+id]){
          showNativeNotification('Deadline in '+Math.round(rem/60000)+' Min!', t.name+' laeuft bald ab!');
          warned['dl_'+id]=true;
        }
      });
    }

    // New messages (for sub)
    if(config.events.newMessage!==false){
      var unread=(S.domMessages||[]).filter(function(m){return !m.read;});
      if(unread.length>0 && !warned['msg_'+unread[0].id]){
        showNativeNotification('Neue Anweisung vom Dom', unread[0].text.substring(0,100));
        warned['msg_'+unread[0].id]=true;
      }
    }

    // Mood reminder (once per day)
    if(role==='sub' && config.events.moodReminder!==false){
      var today=new Date().toDateString();
      var hasMoodToday=(S.moodLog||[]).some(function(m){return new Date(m.timestamp).toDateString()===today;});
      if(!hasMoodToday && !warned['mood_'+today]){
        var hour=new Date().getHours();
        if(hour>=10 && hour<=22){
          showNativeNotification('Stimmungs-Check-in', 'Wie geht es dir heute? Logge deine Stimmung!');
          warned['mood_'+today]=true;
        }
      }
    }

    S._pushWarned=warned;
  }, 120000);
}

function renderDomWheelConfig(){
  var wc=S.wheelConfig;
  var h='<div class="section-title">&#127922; Gluecksrad konfigurieren</div>';
  // Cost & limits
  h+='<div class="card"><div class="setting-row"><span class="setting-label">Kosten pro Dreh</span>';
  h+='<input type="number" id="wheelCostInput" value="'+(wc.cost||15)+'" min="0" style="width:70px;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px" onchange="updateWheelCost(this.value)"></div>';
  h+='<div class="setting-row"><span class="setting-label">Max Spins pro Tag</span>';
  h+='<input type="number" id="wheelMaxSpins" value="'+(wc.maxSpinsPerDay||0)+'" min="0" style="width:70px;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px" onchange="updateWheelMaxSpins(this.value)">';
  h+='<span style="font-size:11px;color:var(--muted);margin-left:8px">0 = unbegrenzt</span></div></div>';
  // Segments list
  h+='<div class="section-title" style="margin-top:16px">Segmente ('+((wc.segments||[]).length)+')</div>';
  (wc.segments||[]).forEach(function(seg,i){
    h+='<div class="card" style="padding:10px 12px;margin-bottom:6px">';
    h+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
    h+='<input type="color" value="'+esc(seg.color)+'" style="width:32px;height:32px;border:none;cursor:pointer" onchange="updateWheelSegment('+i+',\'color\',this.value)">';
    h+='<input type="text" value="'+esc(seg.label)+'" placeholder="Label" style="flex:1;min-width:100px;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px" onchange="updateWheelSegment('+i+',\'label\',this.value)">';
    h+='<select style="padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px" onchange="updateWheelSegment('+i+',\'type\',this.value)">';
    var types=[['bonus','Punkte-Bonus'],['multiply','Multiplikator'],['nothing','Niete'],['task','Aufgabe zuweisen'],['punishment','Strafe'],['reward','Gratis-Belohnung'],['points_remove','Punkte abziehen']];
    types.forEach(function(tp){
      h+='<option value="'+tp[0]+'"'+(seg.type===tp[0]?' selected':'')+'>'+tp[1]+'</option>';
    });
    h+='</select>';
    // Value field (context-dependent)
    if(seg.type==='bonus'||seg.type==='multiply'||seg.type==='points_remove'){
      h+='<input type="number" value="'+(seg.value||0)+'" min="0" style="width:60px;padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px" onchange="updateWheelSegment('+i+',\'value\',parseInt(this.value)||0)">';
    }
    // Link to specific task/punishment/reward
    if(seg.type==='task'||seg.type==='punishment'||seg.type==='reward'){
      h+=renderSegmentLinker(seg, i);
    }
    h+='<button class="btn btn-small btn-outline" style="color:var(--red)" onclick="removeWheelSegment('+i+')">&#128465;</button>';
    h+='</div></div>';
  });
  h+='<button class="btn btn-gold" style="width:100%;margin-top:8px" onclick="addWheelSegment()">+ Segment hinzufuegen</button>';
  // Preview
  h+='<div class="section-title" style="margin-top:20px">Vorschau</div>';
  h+='<div style="text-align:center"><canvas id="wheelPreviewCanvas" width="240" height="240"></canvas></div>';
  return h;
}

function renderSegmentLinker(seg, index){
  var h='<select style="padding:6px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;max-width:150px" onchange="updateWheelSegment('+index+',\'linkedId\',this.value)">';
  h+='<option value="">-- Zufaellig --</option>';
  if(seg.type==='task'){
    Object.entries(S.tasks||{}).forEach(function(e){
      h+='<option value="'+e[0]+'"'+(seg.linkedId===e[0]?' selected':'')+'>'+esc(e[1].name)+'</option>';
    });
  } else if(seg.type==='punishment'){
    Object.entries(S.punishments||{}).forEach(function(e){
      h+='<option value="'+e[0]+'"'+(seg.linkedId===e[0]?' selected':'')+'>'+esc(e[1].name)+'</option>';
    });
  } else if(seg.type==='reward'){
    Object.entries(S.rewards||{}).forEach(function(e){
      h+='<option value="'+e[0]+'"'+(seg.linkedId===e[0]?' selected':'')+'>'+esc(e[1].name)+'</option>';
    });
  }
  h+='</select>';
  return h;
}

function updateWheelCost(val){ S.wheelConfig.cost=parseInt(val)||0; saveState(); }
function updateWheelMaxSpins(val){ S.wheelConfig.maxSpinsPerDay=parseInt(val)||0; saveState(); }
function updateWheelSegment(idx,field,val){
  if(S.wheelConfig.segments[idx]){
    S.wheelConfig.segments[idx][field]=val;
    saveState();
    if(field==='type'){
      delete S.wheelConfig.segments[idx].linkedId;
      renderDomTab();
    }
    if(document.getElementById('wheelPreviewCanvas')) drawWheel(0, document.getElementById('wheelPreviewCanvas'), 110);
  }
}
function addWheelSegment(){
  if(!S.wheelConfig)S.wheelConfig={};
  if(!Array.isArray(S.wheelConfig.segments))S.wheelConfig.segments=[];
  S.wheelConfig.segments.push({id:uid(),label:'Neu',color:'#888888',type:'bonus',value:5});
  saveState(); renderDomTab();
}
function removeWheelSegment(idx){
  S.wheelConfig.segments.splice(idx,1);
  saveState(); renderDomTab();
}

</script>
