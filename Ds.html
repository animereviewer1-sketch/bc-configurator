// === FEATURE: WISHLIST ===
function addWish(){
var name=prompt('Name der gewuenschten Belohnung:');
if(!name)return;
var cost=parseInt(prompt('Punktekosten-Vorschlag:'),10);
if(isNaN(cost)||cost<1)cost=10;
var reason=prompt('Begruendung (optional):')||'';
if(!S.wishlist)S.wishlist=[];
S.wishlist.push({id:uid(),name:name,cost:cost,reason:reason,status:'pending',createdBy:role,createdAt:new Date().toISOString()});
saveState();
addLog('wishlist','Neuer Wunsch: '+name+' ('+cost+' Pkt)');
addNotification('Neuer Wunsch eingereicht: '+name);
render();
}
function approveWish(wishId){
var w=(S.wishlist||[]).find(function(x){return x.id===wishId});
if(!w)return;
var newCost=prompt('Punktekosten festlegen (aktuell: '+w.cost+'):',w.cost);
if(newCost===null)return;
w.cost=parseInt(newCost,10)||w.cost;
w.status='approved';
w.approvedAt=new Date().toISOString();
// Add to rewards
var rId=uid();
S.rewards[rId]={name:w.name,cost:w.cost,status:'active',category:'Wunschliste',created:new Date().toISOString(),fromWish:wishId};
saveState();
addLog('wishlist','Wunsch genehmigt: '+w.name+' ('+w.cost+' Pkt)');
addNotification('Wunsch genehmigt: '+w.name);
render();
}
function rejectWish(wishId){
var w=(S.wishlist||[]).find(function(x){return x.id===wishId});
if(!w)return;
if(!confirm('Wunsch "'+w.name+'" ablehnen?'))return;
w.status='rejected';
w.rejectedAt=new Date().toISOString();
saveState();
addLog('wishlist','Wunsch abgelehnt: '+w.name);
render();
}
function renderWishlist(){
var h='<div class="section-title">&#127873; Wunschliste</div>';
if(role==='sub'){
h+='<button class="btn" onclick="addWish()" style="margin-bottom:12px">+ Wunsch einreichen</button>';
}
var wishes=S.wishlist||[];
if(wishes.length===0)return h+'<div class="empty-state">Noch keine Wuensche eingereicht</div>';
['pending','approved','rejected'].forEach(function(status){
var filtered=wishes.filter(function(w){return w.status===status});
if(filtered.length===0)return;
var label=status==='pending'?'&#9203; Offen':status==='approved'?'&#9989; Genehmigt':'&#10060; Abgelehnt';
h+='<div style="margin:12px 0 6px;font-weight:700;font-size:13px">'+label+' ('+filtered.length+')</div>';
filtered.forEach(function(w){
h+='<div class="wishlist-card '+w.status+'">';
h+='<div class="wishlist-info"><div class="wishlist-name">'+esc(w.name)+'</div>';
if(w.reason)h+='<div class="wishlist-reason">'+esc(w.reason)+'</div>';
h+='</div>';
h+='<div class="wishlist-cost">'+w.cost+' P</div>';
if(role==='dom'&&w.status==='pending'){
h+='<div class="wishlist-actions">';
h+='<button class="approve-btn" onclick="approveWish(\''+w.id+'\')">&check;</button>';
h+='<button class="reject-btn" onclick="rejectWish(\''+w.id+'\')">&times;</button>';
h+='</div>';
}
h+='</div>';
});
});
return h;
}

// === FEATURE: WEEKLY REPORT ===
function generateWeeklyReport(){
var now=new Date();
var weekAgo=new Date(now.getTime()-7*86400000);
var report={period:weekAgo.toLocaleDateString('de')+' - '+now.toLocaleDateString('de'),tasks:{completed:0,created:0},points:{earned:0,spent:0},streak:S.streak||0,streakBest:S.streakBest||0,challenges:0,moods:[],categories:{}};
// Count completed tasks this week
Object.values(S.tasks||{}).forEach(function(t){
if(t.status==='completed'&&t.completedAt&&new Date(t.completedAt)>=weekAgo){report.tasks.completed++;var c=t.category||'Sonstiges';report.categories[c]=(report.categories[c]||0)+1}
if(t.created&&new Date(t.created)>=weekAgo)report.tasks.created++;
});
Object.values(S.archive&&S.archive.tasks||{}).forEach(function(t){
if(t.status==='completed'&&t.completedAt&&new Date(t.completedAt)>=weekAgo){report.tasks.completed++;var c=t.category||'Sonstiges';report.categories[c]=(report.categories[c]||0)+1}
});
// Points from history
(S.pointsHistory||[]).forEach(function(p){
if(new Date(p.date)>=weekAgo){
if(p.amount>0)report.points.earned+=p.amount;
else report.points.spent+=Math.abs(p.amount);
}
});
// Challenges
(S.log||[]).forEach(function(l){
if(l.type==='challenge'&&new Date(l.date)>=weekAgo)report.challenges++;
});
// Moods
(S.moodLog||[]).forEach(function(m){
if(new Date(m.date)>=weekAgo)report.moods.push(m);
});
return report;
}
function renderWeeklyReport(){
var r=generateWeeklyReport();
var h='<div class="section-title">&#128202; Wochen-Report</div>';
h+='<div style="font-size:12px;color:var(--muted);margin-bottom:12px">'+r.period+'</div>';
// Tasks section
h+='<div class="report-section"><div class="report-section-title">&#9745; Aufgaben</div>';
h+='<div class="report-stat-row"><span>Erledigt</span><strong>'+r.tasks.completed+'</strong></div>';
h+='<div class="report-stat-row"><span>Neu erstellt</span><strong>'+r.tasks.created+'</strong></div>';
// Category breakdown
var cats=Object.entries(r.categories).sort(function(a,b){return b[1]-a[1]});
if(cats.length>0){
var maxCat=cats[0][1];
cats.forEach(function(c){
var pct=Math.round(c[1]/maxCat*100);
h+='<div style="margin:4px 0"><div style="display:flex;justify-content:space-between;font-size:12px"><span>'+esc(c[0])+'</span><span>'+c[1]+'</span></div>';
h+='<div class="report-bar" style="background:var(--surface)"><div class="report-bar-fill" style="width:'+pct+'%;background:var(--accent)"></div></div></div>';
});
}
h+='</div>';
// Points section
h+='<div class="report-section"><div class="report-section-title">&#128176; Punkte</div>';
h+='<div class="report-stat-row"><span>Verdient</span><strong style="color:var(--green)">+'+r.points.earned+'</strong></div>';
h+='<div class="report-stat-row"><span>Ausgegeben</span><strong style="color:var(--red)">-'+r.points.spent+'</strong></div>';
h+='<div class="report-stat-row"><span>Netto</span><strong>'+(r.points.earned-r.points.spent)+'</strong></div>';
h+='</div>';
// Streak
h+='<div class="report-section"><div class="report-section-title">&#128293; Streak</div>';
h+='<div class="report-stat-row"><span>Aktuell</span><strong>'+r.streak+' Tage</strong></div>';
h+='<div class="report-stat-row"><span>Rekord</span><strong>'+r.streakBest+' Tage</strong></div>';
h+='</div>';
// Challenges
h+='<div class="report-section"><div class="report-section-title">&#127775; Challenges</div>';
h+='<div class="report-stat-row"><span>Abgeschlossen</span><strong>'+r.challenges+'</strong></div>';
h+='</div>';
// Moods
if(r.moods.length>0){
h+='<div class="report-section"><div class="report-section-title">&#128522; Stimmung</div>';
var moodIcons={'great':'&#128513;','good':'&#128578;','okay':'&#128528;','bad':'&#128543;','terrible':'&#128557;'};
var dayNames=['So','Mo','Di','Mi','Do','Fr','Sa'];
r.moods.forEach(function(m){
var d=new Date(m.date);
h+='<div class="report-mood-row">';
h+='<span style="font-size:12px;color:var(--muted);min-width:30px">'+dayNames[d.getDay()]+'</span>';
h+='<div class="report-mood-dot" style="background:var(--surface)">'+(moodIcons[m.mood]||'&#128528;')+'</div>';
if(m.note)h+='<span style="font-size:12px;margin-left:6px">'+esc(m.note)+'</span>';
h+='</div>';
});
h+='</div>';
}
return h;
}
