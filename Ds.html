<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BDSM Dynamik</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--card:#1e1e36;--accent:#e05577;--accent2:#7c5cbf;--gold:#f0c040;--text:#e8e8f0;--muted:#7a7a9a;--green:#34c77b;--red:#e05555;--orange:#eda94f;--blue:#5b9bf5;--border:rgba(255,255,255,.06);--glass:rgba(255,255,255,.04);--glass-border:rgba(255,255,255,.08);--shadow:0 2px 12px rgba(0,0,0,.25);--radius:16px;--radius-sm:10px;--radius-xs:8px;--transition:all .25s cubic-bezier(.4,0,.2,1)}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.5}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
.screen{display:none;min-height:100vh;padding:20px 16px;padding-bottom:32px}
.screen.active{display:block}
.btn{padding:12px 24px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);display:inline-flex;align-items:center;gap:8px;letter-spacing:.01em}
.btn:active{transform:scale(.97)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{filter:brightness(1.15);box-shadow:0 4px 16px rgba(224,85,119,.3)}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{background:var(--glass);border:1.5px solid var(--glass-border);color:var(--text);backdrop-filter:blur(8px)}.btn-outline:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-small{padding:7px 14px;font-size:12px;border-radius:var(--radius-xs)}
.btn-icon{width:38px;height:38px;padding:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(8px)}
.btn-icon:hover{background:rgba(255,255,255,.08)}
.card{background:linear-gradient(145deg,var(--card),rgba(26,26,46,.8));border-radius:var(--radius);padding:16px;margin-bottom:14px;position:relative;border:1px solid var(--border);box-shadow:var(--shadow);transition:var(--transition);overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.card:active{transform:translateY(0)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-actions{display:flex;gap:6px;align-items:center}
input,select,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;width:100%;outline:none;transition:var(--transition);font-family:inherit}
input[type=checkbox]{width:18px;height:18px;padding:0;border-radius:5px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,85,119,.15)}
textarea{resize:vertical;min-height:60px}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-green{background:rgba(52,199,123,.12);color:var(--green)}
.badge-red{background:rgba(224,85,85,.12);color:var(--red)}
.badge-orange{background:rgba(237,169,79,.12);color:var(--orange)}
.badge-blue{background:rgba(91,155,245,.12);color:var(--blue)}
.badge-gold{background:rgba(240,192,64,.12);color:var(--gold)}
.badge-muted{background:rgba(122,122,154,.12);color:var(--muted)}
.proof-thumb{width:48px;height:48px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--surface)}
.proof-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:10000;cursor:pointer}
.proof-overlay img{max-width:95%;max-height:90%;border-radius:12px}
.proof-upload-area{border:2px dashed rgba(255,255,255,.12);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;margin:12px 0;transition:var(--transition);background:var(--glass)}
.proof-upload-area:hover{border-color:var(--accent);background:rgba(224,85,119,.04)}
.proof-preview{max-width:100%;max-height:200px;border-radius:8px;margin:8px 0}
.badge-proof{background:rgba(52,152,219,.15);color:var(--blue);font-size:11px;padding:2px 8px;border-radius:6px;margin-left:6px}
.points-display{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin:4px 0 10px;letter-spacing:-.03em;filter:drop-shadow(0 2px 8px rgba(240,192,64,.2))}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-online{background:var(--green);box-shadow:0 0 8px rgba(52,199,123,.5)}
.status-offline{background:var(--muted)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;margin-bottom:6px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(15,15,26,.5),transparent)}
.topbar h2{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.topbar h2 svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tabs{display:flex;gap:4px;padding:4px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:16px;overflow-x:auto}
.tab{padding:10px 16px;border-radius:var(--radius-xs);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:var(--transition);color:var(--muted);border:none;background:transparent}
.tab.active{background:rgba(224,85,119,.12);color:var(--accent)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.active{display:flex}
.modal{background:linear-gradient(180deg,var(--surface),var(--bg));border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--glass-border);border-bottom:none;box-shadow:0 -8px 40px rgba(0,0,0,.5);animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal::before{content:'';display:block;width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 18px}
.modal h3{margin-bottom:16px;font-size:18px;font-weight:700;letter-spacing:-.02em}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.form-row{display:flex;gap:8px}
.form-row>*{flex:1}
.timer-display{font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:4px}
.timer-active{background:rgba(243,156,18,.15);color:var(--orange)}
.timer-expired{background:rgba(231,76,60,.15);color:var(--red)}
.log-entry{padding:12px 14px;border-left:3px solid var(--accent);margin-bottom:8px;background:var(--glass);border-radius:0 var(--radius-xs) var(--radius-xs) 0;font-size:13px;transition:var(--transition);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.log-entry:hover{background:rgba(255,255,255,.05);border-left-width:4px}
.log-entry .log-time{color:var(--muted);font-size:10px;margin-bottom:3px;font-weight:500;letter-spacing:.02em}
.log-entry .log-text{color:var(--text);line-height:1.45}
.log-entry.log-task{border-left-color:var(--blue)}
.log-entry.log-reward{border-left-color:var(--gold)}
.log-entry.log-punish{border-left-color:var(--red)}
.log-entry.log-rule{border-left-color:var(--accent2)}
.log-entry.log-suggest{border-left-color:var(--green)}
.suggest-card{border:1px solid rgba(39,174,96,.3);background:rgba(39,174,96,.05)}
.archive-card{opacity:.65;border-style:dashed}
.repeat-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(52,152,219,.2);color:var(--blue)}
.section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px;line-height:1.6;background:var(--glass);border:1px dashed var(--glass-border);border-radius:var(--radius);margin:8px 0}
.top-tabs{display:flex;gap:0;padding:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:rgba(15,15,26,.6);border:1px solid var(--glass-border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--radius);margin:0 0 16px;position:sticky;top:0;z-index:20}
.top-tabs::-webkit-scrollbar{display:none}
.top-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 6px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;position:relative;letter-spacing:.02em}
.top-tab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:var(--transition)}
.top-tab.active{background:linear-gradient(135deg,rgba(224,85,119,.15),rgba(124,92,191,.1));color:var(--accent);box-shadow:0 2px 8px rgba(224,85,119,.12)}
.top-tab.active svg{stroke:var(--accent);filter:drop-shadow(0 0 4px rgba(224,85,119,.3))}
.top-tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.04)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;margin-left:4px;line-height:1}
.subtab-pill{position:relative}
.pill-badge{display:inline-flex;align-items:center;justify-content:center;min-width:14px;height:14px;padding:0 3px;border-radius:7px;background:var(--red,#e94560);color:#fff;font-size:9px;font-weight:700;margin-left:3px;line-height:1}
.counter-badge{background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;position:absolute;top:2px;right:50%;transform:translateX(70%)}
.sub-section-divider{border-top:1px solid rgba(255,255,255,.08);margin:24px 0 8px;padding-top:8px}
.toggle-pill{position:relative;width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.12);cursor:pointer;transition:var(--transition);border:none;padding:0;flex-shrink:0}
.toggle-pill.on{background:var(--green)}
.toggle-pill::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-pill.on::after{transform:translateX(20px)}
.item-inactive{opacity:.5}
.filter-bar{display:flex;gap:3px;margin-bottom:12px;padding:3px;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius-xs)}
.filter-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:var(--transition)}
.filter-btn.active{background:rgba(224,85,119,.1);color:var(--accent)}
.filter-btn:hover:not(.active){color:var(--text)}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:8px 0 8px 16px}
.checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .3s ease}

.chat-container{display:flex;flex-direction:column;height:calc(100vh - 280px)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:6px}
.chat-bubble{max-width:78%;padding:11px 15px;border-radius:20px;font-size:14px;line-height:1.5;word-wrap:break-word;transition:var(--transition);animation:fadeIn .25s ease}
.chat-bubble-self{align-self:flex-end;background:linear-gradient(135deg,var(--accent),#b8426a);color:#fff;border-bottom-right-radius:6px;box-shadow:0 2px 8px rgba(224,85,119,.2)}
.chat-bubble-other{align-self:flex-start;background:var(--surface);color:var(--text);border:1px solid var(--glass-border);border-bottom-left-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.chat-bubble .chat-time{font-size:10px;opacity:.45;margin-top:4px;font-weight:500}
.chat-input-area{display:flex;gap:8px;padding:12px 0;border-top:1px solid var(--border);background:linear-gradient(0deg,var(--bg),transparent);position:sticky;bottom:0}
.stats-bar-container{display:flex;align-items:flex-end;gap:4px;height:120px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:12px 0}
.stats-bar{flex:1;border-radius:4px 4px 0 0;min-height:4px;transition:height .4s cubic-bezier(.4,0,.2,1);position:relative}
.stats-bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.stats-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.stats-card{background:linear-gradient(145deg,var(--surface),rgba(30,30,54,.6));border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;transition:var(--transition);position:relative;overflow:hidden}
.stats-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:.5;border-radius:2px 2px 0 0}
.stats-card:hover{border-color:rgba(255,255,255,.1)}
.stats-card .stats-value{font-size:22px;font-weight:800;letter-spacing:-.02em}
.stats-card .stats-label{font-size:11px;color:var(--muted);margin-top:4px}
.category-filter{display:flex;gap:4px;overflow-x:auto;padding:4px;margin-bottom:8px;-webkit-overflow-scrolling:touch}
.category-filter::-webkit-scrollbar{display:none}
.cat-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:all .2s}
.cat-btn.active{color:#fff}
.cat-btn:not(.active){background:var(--surface);color:var(--muted)}
.category-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{padding-left:40px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:var(--radius-sm)}
.search-bar::before{content:'';position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--muted);border-radius:50%;opacity:.5}
.search-bar::after{content:'';position:absolute;left:26px;top:calc(50% + 6px);width:2px;height:6px;background:var(--muted);transform:rotate(-45deg);opacity:.5}
.streak-display{display:flex;align-items:center;gap:10px;padding:10px 16px;background:linear-gradient(135deg,rgba(237,169,79,.1),rgba(224,85,85,.06));border:1px solid rgba(237,169,79,.12);border-radius:var(--radius);margin-bottom:14px}
.streak-fire{font-size:22px}
.streak-info{flex:1}
.streak-count{font-size:18px;font-weight:800;color:var(--orange);letter-spacing:-.02em}
.streak-best{font-size:11px;color:var(--muted)}
.rank-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:8px}
.rank-badge.rank-neuling{background:rgba(136,136,153,.2);color:var(--muted)}
.rank-badge.rank-lehrling{background:rgba(52,152,219,.2);color:var(--blue)}
.rank-badge.rank-fortgeschritten{background:rgba(39,174,96,.2);color:var(--green)}
.rank-badge.rank-erfahren{background:rgba(243,156,18,.2);color:var(--orange)}
.rank-badge.rank-meister{background:rgba(233,69,96,.2);color:var(--accent)}
.rank-badge.rank-legende{background:linear-gradient(135deg,rgba(245,197,24,.3),rgba(233,69,96,.2));color:var(--gold)}
.goal-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.goal-bar-bg{width:100%;height:18px;background:rgba(255,255,255,.06);border-radius:10px;overflow:hidden;margin:8px 0}
.goal-bar-fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--gold))}
.star-rating{display:inline-flex;gap:2px;cursor:pointer}
.star-rating .star{font-size:22px;color:rgba(255,255,255,.15);transition:color .2s}
.star-rating .star.filled{color:var(--gold)}
.star-rating .star:hover,.star-rating .star.hover{color:var(--gold);opacity:.7}
.history-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-left:3px solid var(--muted);margin-bottom:6px;background:rgba(15,52,96,.3);border-radius:0 10px 10px 0}
.history-entry.history-reward{border-left-color:var(--gold)}
.history-entry.history-punish{border-left-color:var(--red)}
.history-entry.history-task{border-left-color:var(--green)}
.perk-list{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.perk-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
.perk-item.unlocked{color:var(--green)}
.perk-item.locked{color:var(--muted);opacity:.5}
/* === FEATURE: DOM MESSAGES === */
.msg-banner{background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:14px;padding:16px;margin-bottom:12px;position:relative;animation:slideDown .4s ease}
.msg-banner .msg-close{position:absolute;top:8px;right:12px;background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer}
.msg-banner .msg-from{font-size:11px;text-transform:uppercase;letter-spacing:1px;opacity:.7;margin-bottom:4px}
.msg-banner .msg-text{font-size:15px;line-height:1.5}
.msg-banner .msg-time{font-size:10px;opacity:.5;margin-top:6px}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.dom-msg-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border-left:3px solid var(--accent2)}
/* === FEATURE: MOOD CHECK-IN === */
.mood-slider-wrap{display:flex;justify-content:center;gap:12px;padding:8px 0}
.mood-emoji{font-size:32px;cursor:pointer;transition:transform .2s;display:inline-block}
.mood-emoji:hover{transform:scale(1.3)}
.mood-chart{display:flex;align-items:flex-end;gap:6px;height:100px;padding:8px;background:var(--surface);border-radius:12px}
.mood-bar{flex:1;min-width:16px;border-radius:6px 6px 0 0;position:relative;transition:height .3s;display:flex;align-items:flex-start;justify-content:center}
.mood-bar-label{font-size:12px;margin-top:2px}
/* === FEATURE: DAILY CHALLENGES === */
.challenge-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08)}
.challenge-card.completed{border-color:var(--green);opacity:.7}
.challenge-bonus{font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap}
/* === FEATURE: LUCKY WHEEL === */
.wheel-container{text-align:center;padding:16px 0}
.wheel-cost{font-size:14px;color:var(--muted);margin-bottom:12px}
.wheel-canvas{position:relative;display:inline-block}
.wheel-pointer{font-size:28px;color:var(--gold);margin-bottom:-8px;position:relative;z-index:2}
.wheel-result{margin-top:16px;padding:14px;border-radius:12px;font-size:18px;font-weight:700;animation:slideDown .4s ease}
.wheel-result.win{background:rgba(39,174,96,.15);color:var(--green)}
.wheel-result.lose{background:rgba(231,76,60,.15);color:var(--red)}
.wheel-result.warn{color:#f39c12;font-weight:700;font-size:16px;margin-top:12px;text-align:center}
/* === FEATURE: DEADLINE URGENCY === */
.deadline-urgent{border-color:var(--red)!important;box-shadow:0 0 8px rgba(231,76,60,.3);animation:pulseRed 2s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 8px rgba(231,76,60,.3)}50%{box-shadow:0 0 16px rgba(231,76,60,.5)}}
/* === FEATURE: REPEAT FILTER === */
.repeat-filter-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;margin-left:4px}
.repeat-filter-btn.active{background:var(--blue);color:#fff}
/* === FEATURE: ACTIVITY HEATMAP === */
.heatmap-wrap{overflow-x:auto;margin:12px 0;-webkit-overflow-scrolling:touch}
.heatmap-wrap::-webkit-scrollbar{display:none}
.heatmap-grid{display:flex;gap:2px}
.heatmap-col{display:flex;flex-direction:column;gap:2px}
.heatmap-cell{width:12px;height:12px;border-radius:2px;background:rgba(255,255,255,.05)}
.heatmap-cell.l1{background:rgba(39,174,96,.2)}
.heatmap-cell.l2{background:rgba(39,174,96,.4)}
.heatmap-cell.l3{background:rgba(39,174,96,.6)}
.heatmap-cell.l4{background:rgba(39,174,96,.85)}
.heatmap-legend{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;color:var(--muted);justify-content:flex-end}
.heatmap-legend .heatmap-cell{cursor:default}
.heatmap-months{display:flex;font-size:9px;color:var(--muted);margin-bottom:2px}
.heatmap-months span{flex:1;min-width:0}
/* === REDESIGN: SUB-TAB PILLS === */
.subtab-pills{display:flex;gap:4px;padding:4px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:var(--radius-sm);margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.subtab-pills::-webkit-scrollbar{display:none}
.subtab-pill{padding:7px 16px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:var(--transition);color:var(--muted);border:none;background:transparent;position:relative}
.subtab-pill.active{background:linear-gradient(135deg,rgba(224,85,119,.12),rgba(124,92,191,.08));color:var(--accent);box-shadow:0 1px 6px rgba(224,85,119,.1)}
.subtab-pill:hover:not(.active){color:var(--text);background:rgba(255,255,255,.05)}
/* === PRIORITY SYSTEM === */
.priority-high{border-left:4px solid var(--red) !important}
.priority-medium{border-left:4px solid var(--orange) !important}
.priority-low{border-left:4px solid var(--blue) !important}
.priority-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px}
.priority-badge.high{background:rgba(231,76,60,.2);color:var(--red)}
.priority-badge.medium{background:rgba(243,156,18,.2);color:var(--orange)}
.priority-badge.low{background:rgba(52,152,219,.2);color:var(--blue)}
/* === TASK CHAIN === */
.chain-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:2px}
.chain-locked{opacity:.5;pointer-events:none;position:relative}
.chain-locked::after{content:'Gesperrt';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:var(--red);padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;z-index:2}
/* === ESCALATION === */
.escalation-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(231,76,60,.15);color:var(--red);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* === PROOF GALLERY === */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:12px 0}
.gallery-item{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--surface)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .2s}
.gallery-item:hover img{transform:scale(1.05)}
.gallery-item .gallery-label{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:10px;color:#fff}
.gallery-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column}
.gallery-overlay img{max-width:90%;max-height:70vh;border-radius:8px}
.gallery-overlay .gallery-info{color:#fff;text-align:center;margin-top:12px;font-size:14px}
.gallery-filter{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
.gallery-filter select{padding:6px 10px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;font-size:13px}
/* === FEATURE: WEEKLY COMPARISON === */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.compare-card{background:var(--surface);border-radius:12px;padding:12px;text-align:center}
.compare-card .compare-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.compare-card .compare-values{display:flex;justify-content:center;align-items:baseline;gap:8px}
.compare-card .compare-current{font-size:20px;font-weight:800}
.compare-card .compare-prev{font-size:13px;color:var(--muted)}
.compare-card .compare-change{font-size:12px;font-weight:700;margin-top:4px}
.compare-change.up{color:var(--green)}
.compare-change.down{color:var(--red)}
.compare-change.same{color:var(--muted)}
/* === ACHIEVEMENT SYSTEM === */
.achievement-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:14px 0}
.achievement-card{background:var(--surface);border-radius:var(--radius);padding:16px;text-align:center;position:relative;border:1px solid var(--border);transition:var(--transition)}
.achievement-card.unlocked{border-color:var(--accent2);box-shadow:0 0 16px rgba(124,92,191,.2)}
.achievement-card.locked{opacity:.35;filter:grayscale(1)}
.achievement-icon{font-size:32px;margin-bottom:6px}
.achievement-name{font-size:13px;font-weight:700;margin-bottom:4px}
.achievement-desc{font-size:11px;color:var(--muted)}
.achievement-date{font-size:10px;color:var(--accent);margin-top:6px}
.achievement-new{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;animation:pulse 1.5s infinite}
/* === TASK NOTES === */
.task-notes{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.task-notes-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.note-bubble{padding:8px 12px;border-radius:12px;margin-bottom:6px;max-width:85%;font-size:13px;line-height:1.4}
.note-bubble.dom{background:var(--accent);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.note-bubble.sub{background:var(--surface);border:1px solid var(--border);margin-right:auto;border-bottom-left-radius:4px}
.note-meta{font-size:10px;color:var(--muted);margin-top:2px}
.note-input-row{display:flex;gap:6px;margin-top:8px}
.note-input-row input{flex:1;padding:8px 12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:20px;font-size:13px}
.note-input-row button{padding:8px 14px;border-radius:20px;background:var(--accent);color:#fff;border:none;font-size:13px;cursor:pointer}
/* === WISHLIST === */
.wishlist-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);transition:var(--transition)}
.wishlist-card:hover{border-color:rgba(255,255,255,.1)}
.wishlist-card.approved{border-color:var(--green)}
.wishlist-card.rejected{border-color:var(--red);opacity:.6}

.wishlist-name{font-weight:700;font-size:14px}
.wishlist-reason{font-size:12px;color:var(--muted);margin-top:2px}
.wishlist-cost{font-size:16px;font-weight:800;color:var(--accent);margin:0 12px}
.wishlist-actions{display:flex;gap:6px}
.wishlist-actions button{padding:6px 12px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:600}
.wishlist-actions .approve-btn{background:var(--green);color:#fff}
.wishlist-actions .reject-btn{background:var(--red);color:#fff}
.wishlist-actions .adjust-btn{background:var(--surface);color:var(--text);border:1px solid var(--border)}
/* === WEEKLY REPORT === */
.report-section{margin-bottom:16px}
.report-section-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.report-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-stat-row:last-child{border-bottom:none}
.report-bar{height:18px;border-radius:4px;margin:4px 0;position:relative;overflow:hidden}
.report-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.report-bar-label{position:absolute;right:6px;top:1px;font-size:10px;font-weight:700;color:#fff}

.report-mood-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
</style>

// === LOGGING ===
function addLog(type,text){
if(!text)text='(kein Text)';
S.log.unshift({id:uid(),type:type||'general',text:String(text),time:ts(),timestamp:Date.now()});
if(S.log.length>200)S.log=S.log.slice(0,200);
// Sanitize: remove any log entries with undefined values (legacy cleanup)
for(var i=S.log.length-1;i>=0;i--){var e=S.log[i];if(!e||e.text===undefined||e.text===null||e.type===undefined){S.log.splice(i,1);}}
saveState();
}

function addNotification(text){
if(!S.notifications)S.notifications=[];
S.notifications.unshift({id:uid(),text:text,time:ts(),timestamp:Date.now(),read:false});
if(S.notifications.length>50)S.notifications=S.notifications.slice(0,50);
saveState();
}

function addPointsHistory(amount,reason){
if(!S.pointsHistory)S.pointsHistory=[];

if(S.pointsHistory.length>500)S.pointsHistory=S.pointsHistory.slice(-500);

// === FEATURE: STREAK SYSTEM ===
function todayStr(){return new Date().toISOString().slice(0,10)}
function updateStreak(){
var today=todayStr();
if(S.streak.lastDate===today)return; // already counted today
var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
var yStr=yesterday.toISOString().slice(0,10);
if(S.streak.lastDate===yStr){S.streak.current++;}else{S.streak.current=1;}
S.streak.lastDate=today;
if(S.streak.current>S.streak.best)S.streak.best=S.streak.current;
// Streak bonuses
var bonus=0;
if(S.streak.current>=30)bonus=15;
else if(S.streak.current>=14)bonus=10;
else if(S.streak.current>=7)bonus=5;
else if(S.streak.current>=3)bonus=2;
if(bonus>0){
S.points+=bonus;S.lifetimePoints+=bonus;
addPointsHistory(bonus,'Streak-Bonus ('+S.streak.current+' Tage)');
addNotification('&#128293; Streak-Bonus! +'+bonus+' Punkte fuer '+S.streak.current+' Tage Streak!');
sendPushIfEnabled('streakReminder','Streak-Bonus! +'+bonus+' Punkte fuer '+S.streak.current+' Tage Streak!');
}
}
function renderStreakDisplay(){
var s=S.streak||{current:0,best:0};
if(s.current<1)return '';
var h='<div class="streak-display"><span class="streak-fire">&#128293;</span><div class="streak-info">';
h+='<div class="streak-count">'+s.current+' Tage Streak</div>';
h+='<div class="streak-best">Rekord: '+s.best+' Tage</div>';
h+='</div></div>';
return h;
}

// === FEATURE: GOALS (TAGES-/WOCHEN-ZIELE) ===
function checkGoalReset(){
var now=new Date();
var todayKey=now.toISOString().slice(0,10);
var weekKey=now.getFullYear()+'-W'+String(Math.ceil(((now-new Date(now.getFullYear(),0,1))/86400000+new Date(now.getFullYear(),0,1).getDay()+1)/7)).padStart(2,'0');
if(S.goals.daily.lastReset!==todayKey){S.goals.daily.earned=0;S.goals.daily.lastReset=todayKey;}
if(S.goals.weekly.lastReset!==weekKey){S.goals.weekly.earned=0;S.goals.weekly.lastReset=weekKey;}
}
function addGoalProgress(pts){
checkGoalReset();
if(pts<=0)return;
var dg=S.goals.daily,wg=S.goals.weekly;
var dBefore=dg.earned<dg.target&&dg.target>0;
var wBefore=wg.earned<wg.target&&wg.target>0;
dg.earned+=pts;wg.earned+=pts;
if(dBefore&&dg.earned>=dg.target){
var db=dg.bonus||5;
S.points+=db;S.lifetimePoints+=db;
addPointsHistory(db,'Tagesziel erreicht! Bonus');
addNotification('&#127942; Tagesziel erreicht! +'+db+' Bonus-Punkte!');
}
if(wBefore&&wg.earned>=wg.target){
var wb=wg.bonus||20;
S.points+=wb;S.lifetimePoints+=wb;
addPointsHistory(wb,'Wochenziel erreicht! Bonus');
addNotification('&#127942; Wochenziel erreicht! +'+wb+' Bonus-Punkte!');
}
}

// === BADGE SYSTEM ===
function markSeen(r,tab,sub){if(!S.lastSeen)S.lastSeen={};S.lastSeen[r+'_'+tab+'_'+sub]=Date.now();saveState();}
function seenTs(r,tab,sub){return (S.lastSeen||{})[r+'_'+tab+'_'+sub]||0;}

function countNewItems(collection,tsField,since){
if(!collection)return 0;var c=0;
if(Array.isArray(collection)){for(var i=0;i<collection.length;i++){if((collection[i][tsField]||0)>since)c++;}}
else{var keys=Object.keys(collection);for(var i=0;i<keys.length;i++){if((collection[keys[i]][tsField]||0)>since)c++;}}
return c;}

function countUnseenAchievements(){
if(!S.achievements)return 0;var c=0;
for(var i=0;i<ACHIEVEMENTS.length;i++){var a=ACHIEVEMENTS[i];if(S.achievements[a.id]&&S.achievements[a.id].unlocked&&!S.achievements[a.id].seen)c++;}
return c;}

function countUnreadChat(){
return S.unreadChat||0;}

function getDomSubCounts(){
var counts={};
// tasks - count tasks where created OR submittedAt is newer than lastSeen (no double-count)
var ts=seenTs('dom','tasks','active');var ac=0;
var items=S.tasks||{};for(var k in items){if(items.hasOwnProperty(k)){var t=items[k];var c=t.created||0;var s=t.submittedAt||0;if(Math.max(c,s)>ts)ac++;}}
counts.active=ac;
counts.templates=countNewItems(S.templates,'created',seenTs('dom','tasks','templates'));
counts.rules=countNewItems(S.rules,'created',seenTs('dom','tasks','rules'));
counts.punishments=countNewItems(S.punishments,'created',seenTs('dom','tasks','punishments'));
// rewards
counts.shop=countNewItems(S.rewards,'created',seenTs('dom','rewards','shop'));
counts.wishlist=countNewItems(S.wishlist,'created',seenTs('dom','rewards','wishlist'));
counts.wheel=countNewItems(S.wheelHistory,'timestamp',seenTs('dom','rewards','wheel'));
// progress
counts.stats=0;
counts.achievements=countUnseenAchievements();
counts.report=0;
counts.goals=0;
// comm
counts.chat=countUnreadChat();
counts.messages=countNewItems(S.domMessages,'timestamp',seenTs('dom','comm','messages'));
counts.diary=countNewItems(S.diary,'ts',seenTs('dom','comm','diary'));
// more
counts.log=0;
counts.gallery=0;
counts.suggestions=countNewItems(S.suggestions,'created',seenTs('dom','more','suggestions'));
return counts;}

function getSubSubCounts(){
var counts={};
// overview
counts.active=countNewItems(S.tasks,'created',seenTs('sub','overview','active'));
counts.challenges=0;if(S.dailyChallenges&&S.dailyChallenges.challenges){var cSeen=seenTs('sub','overview','challenges');for(var i=0;i<S.dailyChallenges.challenges.length;i++){var ch=S.dailyChallenges.challenges[i];if(!ch.completed&&(S.dailyChallenges.date?new Date(S.dailyChallenges.date).getTime():0)>cSeen)counts.challenges++;}}
counts.log=0;
counts.suggest=countNewItems(S.suggestions,'created',seenTs('sub','overview','suggest'));
// rewards
counts.shop=countNewItems(S.rewards,'created',seenTs('sub','rewards','shop'));
counts.wishlist=countNewItems(S.wishlist,'created',seenTs('sub','rewards','wishlist'));
counts.wheel=countNewItems(S.wheelHistory,'timestamp',seenTs('sub','rewards','wheel'));
// progress
counts.stats=0;
counts.achievements=countUnseenAchievements();
counts.mood=countNewItems(S.moodLog,'timestamp',seenTs('sub','progress','mood'));
// comm
counts.chat=countUnreadChat();
counts.diary=countNewItems(S.diary,'ts',seenTs('sub','comm','diary'));
// more
counts.rules=countNewItems(S.rules,'created',seenTs('sub','more','rules'));
counts.moreLog=0;
return counts;}

return ' <span class="'+(cls||'tab-badge')+'">'+count+'</span>';}

function saveTemplate(){
var name=$('mTplName')?$('mTplName').value.trim():'';
if(!name){alert('Name eingeben');return;}
var editId=$('mTplEditId')?$('mTplEditId').value:'';
var checked=document.querySelectorAll('.tplTaskChk:checked');
var taskDefs=[];
var taskIds=[];
checked.forEach(function(cb){
var tid=cb.value;
var t=S.tasks[tid];
if(t){
taskIds.push(tid);
taskDefs.push({name:t.name,desc:t.desc||'',points:t.points||0,timer:t.timer||0,repeat:t.repeat||'none',repeatDays:t.repeatDays||[],repeatInterval:t.repeatInterval||0,penaltyId:t.penaltyId||null});
}
});

// === REPEAT HELPERS ===
var dayNames=['Mo','Di','Mi','Do','Fr','Sa','So'];
function getRepeatLabel(t){
if(!t.repeat||t.repeat==='none')return '';
var r=t.repeat;
if(r==='daily')return 'Taeglich';
if(r==='weekly')return 'Woechentlich';
if(r==='monthly')return 'Monatlich';
if(r==='weekend')return 'Wochenende';
if(r==='weekdays'&&t.repeatDays&&t.repeatDays.length){
return t.repeatDays.map(function(d){return dayNames[d]||'';}).join(', ');
}
if(r==='interval'&&t.repeatInterval>0)return 'Alle '+t.repeatInterval+' Tage';
return r;
}
function isTaskActiveToday(t){
var r=t.repeat;
if(!r||r==='none'||r==='daily'||r==='weekly'||r==='monthly')return true;
var jsDay=new Date().getDay();// 0=Sun
var isoDay=(jsDay+6)%7;// 0=Mon
if(r==='weekend')return isoDay>=5;
if(r==='weekdays'&&t.repeatDays&&t.repeatDays.length)return t.repeatDays.indexOf(isoDay)>=0;
if(r==='interval'&&t.repeatInterval>0){
var created=t.created||Date.now();
var daysSince=Math.floor((Date.now()-created)/86400000);
return daysSince%t.repeatInterval===0;
}
return true;
}
function calcNextDeadline(t){
var r=t.repeat,dl=t.deadline;
if(r==='daily'){return dl?dl+86400000:null;}
if(r==='weekly'){return dl?dl+604800000:null;}
if(r==='monthly'){return dl?dl+2592000000:null;}
if(r==='weekend'||r==='weekdays'){
if(!dl)return null;
// find next active day
var next=new Date(dl);
var rd=r==='weekend'?[5,6]:(t.repeatDays||[]);
if(!rd.length)return dl+86400000;
for(var i=1;i<=7;i++){
next.setDate(next.getDate()+1);
var isoD=(next.getDay()+6)%7;
if(rd.indexOf(isoD)>=0){
next.setHours(23,59,0,0);
return next.getTime();
}
}
return dl+86400000;
}
if(r==='interval'&&t.repeatInterval>0){
return dl?dl+t.repeatInterval*86400000:null;
}
return null;
}
function spawnNextRepeat(t){
var rep=t.repeat;
if(!rep||rep==='none')return;
var newDeadline=calcNextDeadline(t);
var newTimerEnd=newDeadline;
if(!newDeadline&&t.timer>0){newTimerEnd=Date.now()+t.timer*60000;}
S.tasks[uid()]={name:t.name,desc:t.desc,points:t.points,timer:t.timer,deadline:newDeadline,timerEnd:newTimerEnd,timerExpired:false,repeat:t.repeat,repeatDays:t.repeatDays||[],repeatInterval:t.repeatInterval||0,status:'active',penaltyId:t.penaltyId||null,category:t.category||'Sonstiges',priority:t.priority||'none',dependsOn:t.dependsOn||null,requiresProof:t.requiresProof||false,proofType:t.proofType||'photo',created:t.created||Date.now()};
}

function startTimers(){
clearInterval(window._timerInterval);
window._timerInterval=setInterval(function(){
var changed=false;
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
if(t.timerEnd&&t.status==='active'&&!t.timerExpired){
// Skip if not active today (weekday/weekend/interval tasks)
if(!isTaskActiveToday(t))return;
if(Date.now()>=t.timerEnd){
t.timerExpired=true;t.status='failed';t.failedAt=Date.now();
addLog('punish','Aufgabe "'+t.name+'" - Timer abgelaufen!');
if(t.penaltyId&&S.punishments[t.penaltyId]){
executePunish(t.penaltyId,t.name);
}
changed=true;
}
}
});
// Auto-set deadline for repeating tasks without timer
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
var isRepeat=t.repeat&&t.repeat!=='none';
if(isRepeat&&t.status==='active'&&!t.timerEnd&&isTaskActiveToday(t)){
var endOfDay=new Date();endOfDay.setHours(23,59,0,0);
t.timerEnd=endOfDay.getTime();t.deadline=endOfDay.getTime();
changed=true;
}
});
// === PUNISHMENT ESCALATION ===
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
if(t.type==='punishment'&&t.status==='active'&&t.created){
var age=Date.now()-t.created;
if(age>172800000&&!t.escalated48){
t.escalated48=true;
S.tasks[uid()]={name:'\u26A1 ESKALATION: '+t.name,desc:'Automatisch erstellt nach 48h ohne Erledigung',points:0,timer:0,deadline:null,timerEnd:null,timerExpired:false,repeat:'none',status:'active',type:'punishment',penaltyId:null,created:Date.now()};
addLog('punish','Strafe "'+t.name+'" 48h eskaliert - Zusatzstrafe erstellt');
changed=true;
}else if(age>86400000&&!t.escalated24){
t.escalated24=true;
t.points=(t.points||0)*2;
addLog('punish','Strafe "'+t.name+'" 24h eskaliert - Punkte verdoppelt auf '+t.points);
changed=true;
}
}
});
if(changed)saveState();
renderTimerDisplays();
},1000);
}
function renderTimerDisplays(){
document.querySelectorAll('[data-timer-id]').forEach(function(el){
var t=S.tasks[el.dataset.timerId];
if(!t||!t.timerEnd||t.status!=='active')return;
var rem=Math.max(0,t.timerEnd-Date.now());
if(rem<=0){el.innerHTML='<span class="timer-display timer-expired">&#9200; Abgelaufen!</span>';return}
var d=Math.floor(rem/86400000),hr=Math.floor((rem%86400000)/3600000),mn=Math.floor((rem%3600000)/60000),sc=Math.floor((rem%60000)/1000);
var txt='';
if(d>0)txt=d+'d '+hr+'h';
else if(hr>0)txt=hr+'h '+mn+'m';
else txt=mn+'m '+String(sc).padStart(2,'0')+'s';
el.innerHTML='<span class="timer-display timer-active">&#9200; '+txt+'</span>';
});
}

function onRepeatChange(){

function saveTask(){
var name=$('mTaskName').value.trim();if(!name){alert('Name eingeben');return}
var editId=$('mTaskEditId')?$('mTaskEditId').value:'';
var timerMode=$('mTimerMode')?$('mTimerMode').value:'none';
var timerMin=0,deadline=null,timerEnd=null;
if(timerMode==='minutes'){
timerMin=parseInt($('mTaskTimer').value)||0;
timerEnd=timerMin>0?Date.now()+timerMin*60000:null;
}else if(timerMode==='datetime'){
var dlVal=$('mTaskDeadline')?$('mTaskDeadline').value:'';
if(dlVal){deadline=new Date(dlVal).getTime();timerEnd=deadline;}
}
var penaltyId=$('mTaskPenalty')?$('mTaskPenalty').value:'';
var repeatVal=$('mTaskRepeat')?$('mTaskRepeat').value:'none';
var repeatDays=[];
if(repeatVal==='weekdays'){
document.querySelectorAll('.repeatDayChk:checked').forEach(function(cb){repeatDays.push(parseInt(cb.value));});
if(!repeatDays.length){alert('Mindestens einen Wochentag waehlen');return;}
}else if(repeatVal==='weekend'){repeatDays=[5,6];}
var repeatInterval=repeatVal==='interval'?(parseInt($('mRepeatInterval')?$('mRepeatInterval').value:3)||3):0;
var catVal=$('mTaskCat')?$('mTaskCat').value:'Sonstiges';
if(catVal==='__new__'){catVal=prompt('Neue Kategorie:');if(!catVal||!catVal.trim()){catVal='Sonstiges';}else{catVal=catVal.trim();if(S.categories.indexOf(catVal)<0){S.categories.push(catVal);}}}
var reqProof=$('mTaskProof')&&$('mTaskProof').checked;var proofType=$('mProofType')?$('mProofType').value:'photo';
var priorityVal=$('mTaskPriority')?$('mTaskPriority').value:'none';
var dependsOnVal=$('mTaskDependsOn')?$('mTaskDependsOn').value:'';
var data={name:name,desc:$('mTaskDesc').value.trim(),points:parseInt($('mTaskPts').value)||0,timer:timerMin,deadline:deadline,timerEnd:timerEnd,timerExpired:false,repeat:repeatVal,repeatDays:repeatDays,repeatInterval:repeatInterval,status:'active',penaltyId:penaltyId||null,category:catVal,requiresProof:reqProof,proofType:proofType,priority:priorityVal,dependsOn:dependsOnVal||null,created:Date.now()};
if(editId && S.tasks[editId]){
  data.created=S.tasks[editId].created;
  data.status=S.tasks[editId].status;
  S.tasks[editId]=data;
  addLog('task','Aufgabe bearbeitet: "'+name+'"');
}else{
  S.tasks[uid()]=data;
  addLog('task','Aufgabe erstellt: "'+name+'"');
}
saveState();closeModal();render();
}
function completeTask(id){
var t=S.tasks[id];if(!t)return;
if(t.dependsOn&&S.tasks[t.dependsOn]&&S.tasks[t.dependsOn].status!=='done'&&S.tasks[t.dependsOn].status!=='submitted'){addNotification('Aufgabe gesperrt - Vorgaenger noch nicht erledigt!');return;}
if(t.requiresProof){openProofModal(id);return;}
t.status='done';t.timerEnd=null;t.timerExpired=false;
var base=t.points||0;
var priBonus=t.priority==='high'?1.5:t.priority==='medium'?1.25:1;
var mult=getRankMultiplier();
var pts=Math.round(base*mult*priBonus);
if(S.wheelMultiplier&&S.wheelMultiplier>1){pts=pts*S.wheelMultiplier;addNotification('x'+S.wheelMultiplier+' Multiplikator!');delete S.wheelMultiplier;}
var bonusTxt=mult>1?' (Rang-Bonus x'+mult.toFixed(2)+')':'';
var priBonusTxt=priBonus>1?' (Prioritaet x'+priBonus+')':'';
S.points+=pts;S.lifetimePoints+=pts;
updateChallengeProgress('task_completed',1,t.category);
addPointsHistory(pts,'Aufgabe erledigt: '+t.name+bonusTxt+priBonusTxt);
addLog('task','Aufgabe erledigt: "'+t.name+'" (+'+pts+' Pkt'+bonusTxt+')');
updateStreak();
addGoalProgress(pts);
addRedeemHistory('task',t.name,-pts);
if(t.repeat&&t.repeat!=='none')spawnNextRepeat(t);
checkAchievements();
archiveTask(id);
}
function approveTask(id){
var t=S.tasks[id];if(!t)return;
t.status='done';t.timerEnd=null;t.timerExpired=false;
var base=t.points||0;
var priBonus=t.priority==='high'?1.5:t.priority==='medium'?1.25:1;
var mult=getRankMultiplier();
var pts=Math.round(base*mult*priBonus);
var bonusTxt=mult>1?' (Rang-Bonus x'+mult.toFixed(2)+')':'';
var priBonusTxt=priBonus>1?' (Prioritaet x'+priBonus+')':'';
S.points+=pts;S.lifetimePoints+=pts;
addPointsHistory(pts,'Aufgabe bestaetigt: '+t.name+bonusTxt+priBonusTxt);
addLog('task','Aufgabe bestaetigt: "'+t.name+'" (+'+pts+' Pkt'+bonusTxt+priBonusTxt+')');
updateStreak();
addGoalProgress(pts);
addRedeemHistory('task',t.name,-pts);
if(t.repeat&&t.repeat!=='none')spawnNextRepeat(t);
checkAchievements();
archiveTask(id);
// Open rating modal for Dom
if(role==='dom')openRatingModal(id);
}
function rejectTask(id){
var t=S.tasks[id];if(!t)return;
t.status='active';
if(t.deadline){t.timerEnd=t.deadline;}
else if(t.timer>0){t.timerEnd=Date.now()+t.timer*60000;}
else{t.timerEnd=null;}
t.timerExpired=false;
addLog('task','Aufgabe abgelehnt: "'+t.name+'"');
if(t.penaltyId&&S.punishments[t.penaltyId]){
var p=S.punishments[t.penaltyId];
S.points=Math.max(0,S.points-(p.points||0));
addPointsHistory(-(p.points||0),'Auto-Strafe: '+p.name+' fuer '+t.name);
addLog('punish','Auto-Strafe: "'+p.name+'" fuer "'+t.name+'" (-'+p.points+' Pkt)');
}
saveState();render();
}
function reactivateTask(id){
var t=S.tasks[id];if(!t)return;
t.status='active';
if(t.deadline){t.timerEnd=t.deadline;}
else if(t.timer>0){t.timerEnd=Date.now()+t.timer*60000;}
else{t.timerEnd=null;}
t.timerExpired=false;
addLog('task','Aufgabe reaktiviert: "'+t.name+'"');saveState();render();
}
function archiveTask(id){
var t=S.tasks[id];if(!t)return;
if(!S.archive.tasks)S.archive.tasks={};
S.archive.tasks[id]=Object.assign({},t,{archivedAt:Date.now()});
delete S.tasks[id];saveState();render();
}
function reactivateArchived(type,id){
var item=S.archive[type]&&S.archive[type][id];if(!item)return;
if(type==='tasks')openTaskModal(item);
else if(type==='rewards')openRewardModal(item);
else if(type==='punishments')openPunishModal(item);
else if(type==='rules')openRuleModal(item);
}
function deleteTask(id){
if(!confirm('Aufgabe wirklich loeschen?'))return;
var t=S.tasks[id];addLog('task','Aufgabe geloescht: "'+(t?t.name:'')+'"');
delete S.tasks[id];saveState();render();
}
function submitTask(id){
var t=S.tasks[id];if(!t)return;
if(t.dependsOn&&S.tasks[t.dependsOn]&&S.tasks[t.dependsOn].status!=='done'&&S.tasks[t.dependsOn].status!=='submitted'){addNotification('Aufgabe gesperrt - Vorgaenger noch nicht erledigt!');return;}

t.status='submitted';t.submittedAt=Date.now();t.timerEnd=null;t.timerExpired=false;

function compressImage(file,cb){var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var max=800;var w=img.width,h=img.height;if(w>max||h>max){if(w>h){h=h*(max/w);w=max}else{w=w*(max/h);h=max}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.6));};img.src=e.target.result;};reader.readAsDataURL(file);}
function openProofModal(taskId){var t=S.tasks[taskId];if(!t)return;var ptype=t.proofType||'photo';var h='<h3>Beweis einreichen</h3><p style="color:var(--muted);font-size:13px">'+esc(t.name)+'</p><input type="hidden" id="proofTaskId" value="'+taskId+'">';if(ptype==='photo'||ptype==='both'){h+='<div class="proof-upload-area" onclick="$(\'proofFileInput\').click()">&#128247; Foto hochladen<br><span style="font-size:12px;color:var(--muted)">Klicken oder Foto waehlen</span></div><input type="file" id="proofFileInput" accept="image/*" style="display:none" onchange="previewProof(this)"><div id="proofPreviewWrap"></div>';}if(ptype==='text'||ptype==='both'){h+='<div class="form-group"><label>Text-Beweis</label><textarea id="proofText" placeholder="Beschreibe deinen Beweis..." rows="3"></textarea></div>';}h+='<button class="btn btn-accent" style="width:100%;justify-content:center" onclick="submitProof()">Beweis einreichen</button>';openModal(h);}

function submitProof(){var taskId=$('proofTaskId')?$('proofTaskId').value:'';var t=S.tasks[taskId];if(!t)return;var ptype=t.proofType||'photo';var proof={};if(ptype==='photo'||ptype==='both'){var wrap=$('proofPreviewWrap');if(!wrap||!wrap.dataset.proofData){alert('Bitte Foto hochladen');return;}proof.photo=wrap.dataset.proofData;}if(ptype==='text'||ptype==='both'){var txt=$('proofText')?$('proofText').value.trim():'';if(!txt){alert('Bitte Text-Beweis eingeben');return;}proof.text=txt;}t.proof=proof;t.status='submitted';t.submittedAt=Date.now();t.timerEnd=null;t.timerExpired=false;addLog('task','Aufgabe mit Beweis eingereicht: "'+t.name+'"');addNotification('Aufgabe mit Beweis eingereicht: "'+t.name+'"');closeModal();saveState();render();}

// === SUB TASK LOG (completed & failed history) ===
function renderSubTaskLog(){
var h='<div class="section-title">&#9776; Aufgaben-Verlauf</div>';
var items=[];
// Archived (completed) tasks
var archived=Object.entries(S.archive.tasks||{});
archived.forEach(function(e){var id=e[0],t=e[1];
items.push({name:t.name,status:'done',time:t.archivedAt||t.created||0,points:t.points||0});
});
// Done tasks still in active list
Object.entries(S.tasks).forEach(function(e){var t=e[1];
if(t.status==='done')items.push({name:t.name,status:'done',time:t.completedAt||Date.now(),points:t.points||0});
if(t.status==='failed')items.push({name:t.name,status:'failed',time:t.failedAt||Date.now(),points:0});
});
// Sort newest first
items.sort(function(a,b){return b.time-a.time;});
if(!items.length)return h+'<div class="empty-state">Noch keine erledigten oder fehlgeschlagenen Aufgaben</div>';

var chatListener=null;
var chatMessages=[];

function clearChat(){
if(!confirm('Chat wirklich loeschen? Alle Nachrichten werden unwiderruflich entfernt.'))return;
ref('messages').remove();
chatMessages=[];
S.messages=[];
S.unreadChat=0;
updateChatBadges();
saveState();
renderDomTab();
}

function renderChat(){
var h='<div class="chat-container">';
if(role==='dom')h+='<div style="text-align:right;padding:6px 8px"><button class="btn btn-small" onclick="clearChat()" style="font-size:12px;background:var(--danger);color:#fff;padding:6px 14px;border-radius:8px">&#128465; Chat loeschen</button></div>';
h+='<div class="chat-messages" id="chatMessages">';
var msgs=chatMessages.length?chatMessages:(S.messages||[]);
if(!msgs.length){
h+='<div class="empty-state">Noch keine Nachrichten. Starte die Unterhaltung!</div>';
}else{
msgs.forEach(function(m){
var isSelf=m.from===role;
var cls=isSelf?'chat-bubble-self':'chat-bubble-other';
var d=new Date(m.timestamp);
var timeStr=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
h+='<div class="chat-bubble '+cls+'"><div>'+esc(m.text)+'</div><div class="chat-time">'+timeStr+'</div></div>';
});
}
h+='</div>';
h+='<div class="chat-input-area"><input id="chatInput" placeholder="Nachricht schreiben..." style="flex:1" onkeydown="if(event.key===&#39;Enter&#39;)sendMessage()"><button class="btn btn-accent btn-small" onclick="sendMessage()">&#10148;</button></div>';
h+='</div>';
return h;
}

function sendMessage(){
var input=$('chatInput');
if(!input)return;
var text=input.value.trim();
if(!text)return;
input.value='';
var msg={id:uid(),from:role,text:text,timestamp:Date.now(),read:false};
ref('messages').push(msg);
}

function scrollChatBottom(){
setTimeout(function(){
var el=$('chatMessages');
if(el)el.scrollTop=el.scrollHeight;
},100);
}

function updateChatBadges(){
var count=S.unreadChat||0;
var ids=['domChatCount','domChatCountNav','subChatCount','subChatCountNav'];
ids.forEach(function(id){
var el=$(id);
if(el){el.textContent=count;el.style.display=count>0?'inline':'none';}
});
}

function markMessagesRead(){
if(!chatMessages.length)return;
var updates={};
chatMessages.forEach(function(m){
if(m.from!==role&&!m.read&&m._key){
updates[m._key+'/read']=true;
}
});
if(Object.keys(updates).length){
ref('messages').update(updates);
}
}

function startChatListener(){
if(chatListener)return;
chatMessages=[];
var msgRef=ref('messages');
chatListener=msgRef;
msgRef.orderByChild('timestamp').limitToLast(100).on('value',function(snap){
var data=snap.val();
chatMessages=[];
if(data){
Object.keys(data).forEach(function(key){
var m=data[key];
m._key=key;
chatMessages.push(m);
});
chatMessages.sort(function(a,b){return a.timestamp-b.timestamp;});
// Store last 100 in S.messages for offline
S.messages=chatMessages.map(function(m){return {id:m.id,from:m.from,text:m.text,timestamp:m.timestamp,read:m.read};}).slice(-100);
// Count unread
var isOnChat=(role==='dom'&&domTab==='comm'&&domSubTab==='chat')||(role==='sub'&&subTab==='comm'&&subSubTab==='chat');
if(!isOnChat){
var unread=0;
chatMessages.forEach(function(m){if(m.from!==role&&!m.read)unread++;});
if(unread>S.unreadChat){
S.unreadChat=unread;
addNotification('Neue Nachricht'+(unread>1?'en':'')+' im Chat');
}
S.unreadChat=unread;
}else{
S.unreadChat=0;
markMessagesRead();
}
updateChatBadges();
}
if((role==='dom'&&domTab==='comm'&&domSubTab==='chat')||(role==='sub'&&subTab==='comm'&&subSubTab==='chat')){
var c=$(role==='dom'?'domTabContent':'subTabContent');
if(c){var pills=role==='dom'?subtabPills([['chat','Chat'],['messages','Nachrichten'],['diary','Tagebuch']],domSubTab,'setDomSubTab',getDomSubCounts()):subtabPills([['chat','Chat'],['diary','Tagebuch']],subSubTab,'setSubSubTab',getSubSubCounts());c.innerHTML=pills+renderChat();}
scrollChatBottom();
}
});
}

function generateDailyChallenges(){

challenges.push({id:uid(),type:'complete_tasks',desc:'Erledige heute '+n+' Aufgaben',target:n,progress:0,bonus:n*5,completed:false});
var catTasks={};
taskList.forEach(function(t){var c=t.category||'Sonstiges';if(!catTasks[c])catTasks[c]=0;catTasks[c]++;});
var activeCats=Object.keys(catTasks).filter(function(c){return catTasks[c]>=1;});
if(activeCats.length>0){
var randCat=activeCats[Math.floor(Math.random()*activeCats.length)];
challenges.push({id:uid(),type:'category_tasks',desc:'Erledige eine Aufgabe aus "'+randCat+'"',category:randCat,target:1,progress:0,bonus:8,completed:false});

challenges.push({id:uid(),type:'earn_points',desc:'Verdiene heute '+pointTarget+' Punkte',target:pointTarget,progress:0,bonus:10,completed:false});
S.dailyChallenges={date:today,challenges:challenges};

}
function updateChallengeProgress(type,value,category){
if(!S.dailyChallenges||S.dailyChallenges.date!==todayStr())return;
S.dailyChallenges.challenges.forEach(function(c){
if(c.completed)return;
if(type==='task_completed'&&c.type==='complete_tasks'){
c.progress++;
}
if(type==='task_completed'&&c.type==='category_tasks'&&category===c.category){
c.progress++;
}
if(type==='points_earned'&&c.type==='earn_points'){
c.progress+=value;
}
if(c.progress>=c.target&&!c.completed){
c.completed=true;
S.points+=c.bonus;
addPointsHistory(c.bonus,'Challenge-Bonus: '+c.desc);
addNotification('Challenge geschafft! +'+c.bonus+' Bonus');
addLog('challenge','Challenge abgeschlossen: "'+c.desc+'" (+'+c.bonus+')');
}
});
}

});

function drawWheel(rotation, canvasEl, radius){
var canvas = canvasEl || $('wheelCanvas');
if(!canvas)return;
var r = radius || 130;
var size = r*2+20;
canvas.width=size;canvas.height=size;
var ctx=canvas.getContext('2d');
var cx=size/2, cy=size/2;
var segs = S.wheelConfig.segments || [];
if(segs.length===0) return;
var arc=2*Math.PI/segs.length;
var startAngle=rotation||0;
ctx.clearRect(0,0,size,size);
segs.forEach(function(seg,i){
var angle=startAngle+i*arc;
ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,angle,angle+arc);
ctx.fillStyle=seg.color;
ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.15)';
ctx.lineWidth=2;
ctx.stroke();
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(angle+arc/2);
ctx.fillStyle='#fff';
var fontSize=Math.max(9,Math.min(11,r/12));
ctx.font='bold '+fontSize+'px sans-serif';
ctx.textAlign='center';
ctx.fillText(seg.label,r*0.65,4);
ctx.restore();
});
ctx.beginPath();ctx.arc(cx,cy,Math.min(20,r/6),0,2*Math.PI);
ctx.fillStyle='#1a1a2e';ctx.fill();
ctx.strokeStyle='rgba(255,255,255,.2)';ctx.stroke();
}
function spinWheel(){
var cost = S.wheelConfig.cost || 15;
if(wheelSpinning || S.points < cost) return;
// Check daily limit
var maxSpins = S.wheelConfig.maxSpinsPerDay || 0;
if(maxSpins > 0){
  var today = new Date().toDateString();
  if(!S.wheelSpinsToday || S.wheelSpinsToday.date !== today){
    S.wheelSpinsToday = {date: today, count: 0};
  }
  if(S.wheelSpinsToday.count >= maxSpins){
    alert('Maximale Anzahl Spins fuer heute erreicht ('+maxSpins+')');
    return;
  }
  S.wheelSpinsToday.count++;
}
wheelSpinning=true;
S.points-=cost;
addPointsHistory(-cost,'Gluecksrad-Einsatz');
saveState();render();
var btn=$('spinBtn');if(btn)btn.disabled=true;
var segs=S.wheelConfig.segments||[];
if(segs.length===0){wheelSpinning=false;return;}
var winIdx=Math.floor(Math.random()*segs.length);
var arc=2*Math.PI/segs.length;
var targetAngle=-(winIdx*arc+arc/2)-Math.PI/2;
var totalRotation=targetAngle-Math.PI*2*(3+Math.random()*2);
var startTime=null;
var duration=3000;
var currentRotation=0;
function animate(time){
if(!startTime)startTime=time;
var elapsed=time-startTime;
var progress=Math.min(1,elapsed/duration);
var ease=1-Math.pow(1-progress,3);
currentRotation=totalRotation*ease;
drawWheel(currentRotation);
if(progress<1){
requestAnimationFrame(animate);
}else{
wheelSpinning=false;
var seg=segs[winIdx];
var resultEl=$('wheelResult');
var resultMsg='';
if(seg.type==='nothing'){
  resultMsg='<div class="wheel-result lose">Niete! Kein Gewinn</div>';
  S.wheelHistory.push({label:'Niete',won:0,timestamp:Date.now()});
} else if(seg.type==='bonus'){
  S.points+=seg.value;
  addPointsHistory(seg.value,'Gluecksrad: '+seg.label);
  resultMsg='<div class="wheel-result win">'+esc(seg.label)+'! &#127881;</div>';
  S.wheelHistory.push({label:seg.label,won:seg.value,timestamp:Date.now()});
  addNotification('Gluecksrad: '+seg.label+'!');
  sendPushIfEnabled('wheelSpin','Gluecksrad: '+seg.label+'!');
} else if(seg.type==='multiply'){
  S.wheelMultiplier=seg.value;
  resultMsg='<div class="wheel-result win">'+esc(seg.label)+'! Naechste Aufgabe zaehlt '+seg.value+'x! &#127881;</div>';
  S.wheelHistory.push({label:seg.label,won:0,timestamp:Date.now()});
  addNotification('Gluecksrad: '+seg.label+'!');
  sendPushIfEnabled('wheelSpin','Gluecksrad Multiplikator: x'+seg.value);
} else if(seg.type==='points_remove'){
  var remove=Math.min(S.points, seg.value);
  S.points-=remove;
  addPointsHistory(-remove,'Gluecksrad: '+seg.label);
  resultMsg='<div class="wheel-result lose">'+esc(seg.label)+'! -'+remove+' Punkte &#128555;</div>';
  S.wheelHistory.push({label:seg.label,won:-remove,timestamp:Date.now()});
  addNotification('Gluecksrad: -'+remove+' Punkte!');
  sendPushIfEnabled('wheelSpin','Gluecksrad: -'+remove+' Punkte');
} else if(seg.type==='task'){
  var taskEntries=Object.entries(S.tasks||{}).filter(function(e){return e[1].status==='active';});
  var chosen=null;
  if(seg.linkedId && S.tasks[seg.linkedId]){
    chosen={id:seg.linkedId, task:S.tasks[seg.linkedId]};
  } else if(taskEntries.length>0){
    var pick=taskEntries[Math.floor(Math.random()*taskEntries.length)];
    chosen={id:pick[0], task:pick[1]};
  }
  if(chosen){
    chosen.task.wheelAssigned=true;
    chosen.task.wheelAssignedTime=Date.now();
    resultMsg='<div class="wheel-result warn">&#128221; Aufgabe: "'+esc(chosen.task.name)+'" - Sofort erledigen! &#128293;</div>';
    S.wheelHistory.push({label:'Aufgabe: '+chosen.task.name,won:0,timestamp:Date.now()});
    addNotification('Gluecksrad: Aufgabe zugewiesen - "'+chosen.task.name+'"');
    sendPushIfEnabled('wheelSpin','Aufgabe zugewiesen: '+chosen.task.name);
    if(chosen.task.requiresProof){setTimeout(function(){openProofModal(chosen.id);},1500);}
  } else {
    resultMsg='<div class="wheel-result lose">Aufgabe - aber keine aktiven Aufgaben vorhanden!</div>';
    S.wheelHistory.push({label:'Aufgabe (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
} else if(seg.type==='punishment'){
  var punEntries=Object.entries(S.punishments||{});
  var chosenPun=null;
  if(seg.linkedId && S.punishments[seg.linkedId]){
    chosenPun={id:seg.linkedId, pun:S.punishments[seg.linkedId]};
  } else if(punEntries.length>0){
    var pick=punEntries[Math.floor(Math.random()*punEntries.length)];
    chosenPun={id:pick[0], pun:pick[1]};
  }
  if(chosenPun){
    var punPts=chosenPun.pun.points||0;
    executePunish(chosenPun.id,'Gluecksrad');
    resultMsg='<div class="wheel-result lose">&#9888; Strafe: "'+esc(chosenPun.pun.name)+'"'+(punPts>0?' (-'+punPts+' Pkt)':'')+' &#128528;</div>';
    S.wheelHistory.push({label:'Strafe: '+chosenPun.pun.name,won:punPts>0?-punPts:0,timestamp:Date.now()});
    sendPushIfEnabled('punishmentApplied','Gluecksrad-Strafe: '+chosenPun.pun.name);
  } else {
    resultMsg='<div class="wheel-result lose">Strafe - aber keine Strafen definiert!</div>';
    S.wheelHistory.push({label:'Strafe (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
} else if(seg.type==='reward'){
  var rewEntries=Object.entries(S.rewards||{});
  var chosenRew=null;
  if(seg.linkedId && S.rewards[seg.linkedId]){
    chosenRew={id:seg.linkedId, rew:S.rewards[seg.linkedId]};
  } else if(rewEntries.length>0){
    var pick=rewEntries[Math.floor(Math.random()*rewEntries.length)];
    chosenRew={id:pick[0], rew:pick[1]};
  }
  if(chosenRew){
    resultMsg='<div class="wheel-result win">&#127873; Gratis-Belohnung: "'+esc(chosenRew.rew.name)+'" &#127881;</div>';
    S.wheelHistory.push({label:'Belohnung: '+chosenRew.rew.name,won:0,timestamp:Date.now()});
    addNotification('Gluecksrad: Gratis-Belohnung - "'+chosenRew.rew.name+'"!');
    addRedeemHistory('reward',chosenRew.rew.name,0,0);
    sendPushIfEnabled('wheelSpin','Gratis-Belohnung: '+chosenRew.rew.name);
  } else {
    resultMsg='<div class="wheel-result win">Belohnung - aber keine definiert!</div>';
    S.wheelHistory.push({label:'Belohnung (keine verfuegbar)',won:0,timestamp:Date.now()});
  }
}
if(resultEl) resultEl.innerHTML=resultMsg;
if(S.wheelHistory.length>50)S.wheelHistory=S.wheelHistory.slice(-50);
saveState();
var wheelCostNow=S.wheelConfig.cost||15;
var btn2=$('spinBtn');
if(btn2){btn2.disabled=S.points<wheelCostNow;btn2.style.opacity=S.points<wheelCostNow?'.4':'1';}
}
}
requestAnimationFrame(animate);
}

// === FEATURE: AUTO-SPAWNING RECURRING TASKS ===
function checkRecurringTasks(){
var today=todayStr();
if(S._lastRecurCheck===today)return;
S._lastRecurCheck=today;
var spawned=0;
// Check completed tasks that have repeat settings but next wasn't spawned
Object.entries(S.tasks||{}).forEach(function(e){
var id=e[0],t=e[1];
if(t.repeat&&t.repeat!=='none'&&t.status==='completed'){
spawnNextRepeat(t);
t.repeat='none';
spawned++;
}
});
// Check archive: find repeat tasks missing an active instance
var activeRepeatNames={};
Object.values(S.tasks||{}).forEach(function(t){
if(t.repeat&&t.repeat!=='none'&&(t.status==='active'||t.status==='submitted'||t.status==='done')){
activeRepeatNames[t.name+'_'+t.repeat]=true;
}
});
Object.entries(S.archive&&S.archive.tasks||{}).forEach(function(e){
var t=e[1];
if(t.repeat&&t.repeat!=='none'&&!activeRepeatNames[t.name+'_'+t.repeat]){
var nextDl=calcNextDeadline(t);
if(nextDl&&nextDl<=Date.now()+86400000){
spawnNextRepeat(t);
spawned++;
activeRepeatNames[t.name+'_'+t.repeat]=true;
}
}
});
if(spawned>0){
addNotification(spawned+' wiederkehrende Aufgabe'+(spawned>1?'n':'')+' erstellt');
saveState();
}
}

// === FEATURE: WEEKLY COMPARISON ===
function renderWeeklyComparison(){
var h='<div class="section-title">&#128200; Wochen-Vergleich</div>';
var now=new Date();
var todayMs=now.getTime();
var dayOfWeek=(now.getDay()+6)%7;
var thisWeekStart=new Date(now);
thisWeekStart.setDate(thisWeekStart.getDate()-dayOfWeek);
thisWeekStart.setHours(0,0,0,0);
var thisWeekMs=thisWeekStart.getTime();
var lastWeekStart=thisWeekMs-7*86400000;
var lastWeekEnd=thisWeekMs;
var thisWeek={tasks:0,points:0,earned:0,spent:0,activities:0};
var lastWeek={tasks:0,points:0,earned:0,spent:0,activities:0};
(S.pointsHistory||[]).forEach(function(e){
var t=e.timestamp;
if(t>=thisWeekMs&&t<=todayMs){
thisWeek.activities++;
if(e.amount>0){thisWeek.earned+=e.amount;thisWeek.points+=e.amount;}
else{thisWeek.spent+=Math.abs(e.amount);}
}else if(t>=lastWeekStart&&t<lastWeekEnd){
lastWeek.activities++;
if(e.amount>0){lastWeek.earned+=e.amount;lastWeek.points+=e.amount;}
else{lastWeek.spent+=Math.abs(e.amount);}
}
});
(S.log||[]).forEach(function(e){
var t=e.timestamp;
if(!t)return;
var isTask=e.type==='task'&&e.text&&(e.text.indexOf('erledigt')>=0||e.text.indexOf('genehmigt')>=0);
if(t>=thisWeekMs&&t<=todayMs){
if(isTask)thisWeek.tasks++;
}else if(t>=lastWeekStart&&t<lastWeekEnd){
if(isTask)lastWeek.tasks++;
}
});
function pctChange(curr,prev){
if(prev===0&&curr===0)return {pct:0,dir:'same'};
if(prev===0)return {pct:100,dir:'up'};
var p=Math.round((curr-prev)/prev*100);
return {pct:Math.abs(p),dir:p>0?'up':(p<0?'down':'same')};
}
function changeTag(c){
var arrow=c.dir==='up'?'&#9650; +':'&#9660; -';
if(c.dir==='same')return '<div class="compare-change same">&#8596; Gleich</div>';
return '<div class="compare-change '+c.dir+'">'+arrow+c.pct+'%</div>';
}
var metrics=[
{label:'Aufgaben erledigt',curr:thisWeek.tasks,prev:lastWeek.tasks},
{label:'Punkte verdient',curr:thisWeek.earned,prev:lastWeek.earned},
{label:'Punkte ausgegeben',curr:thisWeek.spent,prev:lastWeek.spent},
{label:'Aktivitaeten',curr:thisWeek.activities,prev:lastWeek.activities}
];
h+='<div class="compare-grid">';
metrics.forEach(function(m){
var change=pctChange(m.curr,m.prev);
h+='<div class="compare-card"><div class="compare-label">'+m.label+'</div>';
h+='<div class="compare-values"><span class="compare-current">'+m.curr+'</span><span class="compare-prev">vs '+m.prev+'</span></div>';
h+=changeTag(change)+'</div>';
});
h+='</div>';
return h;
}

// === FEATURE: PUSH NOTIFICATIONS ===
var isEdgeBrowser=/Edg\//i.test(navigator.userAgent);
var pushSupported=('Notification' in window) && !isEdgeBrowser;

function initPushNotifications(){
  if(!pushSupported) return;
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(config && config.enabled && Notification.permission==='granted'){
    scheduleReminders();
  }
}

function sendPushIfEnabled(eventType, body){
  if(!pushSupported || Notification.permission!=='granted') return;
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(!config || !config.enabled) return;
  if(config.events && config.events[eventType]===false) return;
  showNativeNotification('BDSM Dynamik', body);
}

function togglePushMaster(){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  if(!config.enabled){
    Notification.requestPermission().then(function(perm){
      if(perm==='granted'){
        config.enabled=true;
        saveState();
        showNativeNotification('BDSM Dynamik','Benachrichtigungen aktiviert!');
        scheduleReminders();
        openSettings();
      } else {
        alert('Benachrichtigungen wurden vom Browser blockiert.');
      }
    });
  } else {
    config.enabled=false;
    if(window._reminderInterval) clearInterval(window._reminderInterval);
    saveState();
    openSettings();
  }
}

function togglePushEvent(eventKey){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  config.events[eventKey] = !config.events[eventKey];
  saveState();
  openSettings();
}

function updateDeadlineMinutes(val){
  var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
  config.deadlineMinutes = parseInt(val) || 30;
  saveState();
}

function showNativeNotification(title,body){
if(!pushSupported||Notification.permission!=='granted')return;
try{
new Notification(title,{body:body,icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9878;</text></svg>',badge:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#9878;</text></svg>'});
}catch(e){
if('serviceWorker' in navigator&&navigator.serviceWorker.ready){
navigator.serviceWorker.ready.then(function(reg){
reg.showNotification(title,{body:body});
});
}
}
}

function scheduleReminders(){
  if(window._reminderInterval) clearInterval(window._reminderInterval);
  window._reminderInterval=setInterval(function(){
    var config = role==='dom' ? S.settings.domPush : S.settings.subPush;
    if(!config || !config.enabled || Notification.permission!=='granted') return;
    var deadlineMin = config.deadlineMinutes || 30;
    var warned=S._pushWarned||{};

    // Deadline warnings
    if(config.events.deadlineWarning!==false){
      Object.entries(S.tasks||{}).forEach(function(e){
        var id=e[0],t=e[1];
        if(t.status!=='active') return;
        var dl=t.deadline||t.timerEnd;
        if(!dl) return;
        var rem=dl-Date.now();
        if(rem>0 && rem<deadlineMin*60000 && !warned['dl_'+id]){
          showNativeNotification('Deadline in '+Math.round(rem/60000)+' Min!', t.name+' laeuft bald ab!');
          warned['dl_'+id]=true;
        }
      });
    }

    // New messages (for sub)
    if(config.events.newMessage!==false){
      var unread=(S.domMessages||[]).filter(function(m){return !m.read;});
      if(unread.length>0 && !warned['msg_'+unread[0].id]){
        showNativeNotification('Neue Anweisung vom Dom', unread[0].text.substring(0,100));
        warned['msg_'+unread[0].id]=true;
      }
    }

    // Mood reminder (once per day)
    if(role==='sub' && config.events.moodReminder!==false){
      var today=new Date().toDateString();
      var hasMoodToday=(S.moodLog||[]).some(function(m){return new Date(m.timestamp).toDateString()===today;});
      if(!hasMoodToday && !warned['mood_'+today]){
        var hour=new Date().getHours();
        if(hour>=10 && hour<=22){
          showNativeNotification('Stimmungs-Check-in', 'Wie geht es dir heute? Logge deine Stimmung!');
          warned['mood_'+today]=true;
        }
      }
    }

    S._pushWarned=warned;
  }, 120000);
}

// === FEATURE: PROOF GALLERY ===
function renderProofGallery(){
var h='<div class="section-title">&#128247; Beweis-Galerie</div>';
// Collect all tasks/archive with proofs
var proofs=[];
Object.entries(S.tasks).forEach(function(e){
var id=e[0],t=e[1];
if(t.proof)proofs.push({id:id,name:t.name,proof:t.proof,status:t.status,category:t.category||'Sonstiges',date:t.proofDate||t.created||0});
});
if(S.archive&&S.archive.tasks){
Object.entries(S.archive.tasks).forEach(function(e){
var id=e[0],t=e[1];
if(t.proof)proofs.push({id:id,name:t.name,proof:t.proof,status:'archived',category:t.category||'Sonstiges',date:t.proofDate||t.created||0});
});
}
proofs.sort(function(a,b){return(b.date||0)-(a.date||0);});
// Filter controls
var cats={}; proofs.forEach(function(p){cats[p.category]=true;});
h+='<div class="gallery-filter">';
h+='<select onchange="filterGallery(this.value)" id="galleryFilterCat"><option value="all">Alle Kategorien</option>';
Object.keys(cats).sort().forEach(function(c){h+='<option value="'+esc(c)+'">'+esc(c)+'</option>';});
h+='</select>';
h+='<select onchange="filterGalleryType(this.value)" id="galleryFilterType"><option value="all">Alle Typen</option><option value="photo">Fotos</option><option value="text">Text</option></select>';
h+='</div>';
if(proofs.length===0){
h+='<div class="empty-state">Noch keine Beweise vorhanden.<br>Erstelle Aufgaben mit Beweis-Pflicht!</div>';
return h;
}
h+='<div class="gallery-grid" id="galleryGrid">';
proofs.forEach(function(p){
var dateStr=p.date?new Date(p.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';
if(p.proof.photo){
h+='<div class="gallery-item" data-cat="'+esc(p.category)+'" data-type="photo" onclick="showGalleryOverlay(this)" data-name="'+esc(p.name)+'" data-date="'+dateStr+'" data-full="'+p.proof.photo+'">';
h+='<img src="'+p.proof.photo+'" alt="'+esc(p.name)+'" loading="lazy">';
h+='<div class="gallery-label">'+esc(p.name)+'<br>'+dateStr+'</div>';
h+='</div>';
}
if(p.proof.text&&!p.proof.photo){
h+='<div class="gallery-item" data-cat="'+esc(p.category)+'" data-type="text" onclick="showGalleryOverlay(this)" data-name="'+esc(p.name)+'" data-date="'+dateStr+'" data-text="'+esc(p.proof.text)+'" style="display:flex;align-items:center;justify-content:center;padding:8px;font-size:11px;color:var(--muted);text-align:center;background:var(--surface)">';
h+='<div>&#128221;<br>'+esc(p.proof.text.substring(0,60))+(p.proof.text.length>60?'...':'')+'</div>';
h+='<div class="gallery-label">'+esc(p.name)+'<br>'+dateStr+'</div>';
h+='</div>';
}
});
h+='</div>';
h+='<div style="text-align:center;color:var(--muted);font-size:12px;margin-top:8px">'+proofs.length+' Beweis'+(proofs.length!==1?'e':'')+'</div>';
return h;
}
function showGalleryOverlay(el){
var h='<div class="gallery-overlay" onclick="this.remove()">';
if(el.dataset.full){
h+='<img src="'+el.dataset.full+'">';
h+='<div class="gallery-info">'+esc(el.dataset.name||'')+'<br>'+esc(el.dataset.date||'')+'</div>';
}else if(el.dataset.text){
h+='<div style="background:var(--card);padding:24px;border-radius:16px;max-width:500px;color:var(--text)"><h3>'+esc(el.dataset.name||'')+'</h3><p>'+esc(el.dataset.text)+'</p><div style="color:var(--muted);font-size:12px;margin-top:8px">'+esc(el.dataset.date||'')+'</div></div>';

}
function filterGallery(cat){

function filterGalleryType(type){

el.style.display=(showCat&&showType)?'':'none';
});
}

function countCompleted(){var c=0;Object.values(S.tasks||{}).forEach(function(t){if(t.status==='completed')c++});Object.values(S.archive&&S.archive.tasks||{}).forEach(function(t){if(t.status==='completed')c++});return c}

function countProofs(){var c=0;Object.values(S.tasks||{}).forEach(function(t){if(t.proof)c++});Object.values(S.archive&&S.archive.tasks||{}).forEach(function(t){if(t.proof)c++});return c}
